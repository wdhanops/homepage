<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WD-HAN</title>
  <meta name="description" content="WD-HAN — music, merch, shows, and more." />
  <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg" />
  <link rel="apple-touch-icon" href="/assets/img/favicon.svg" />

  <style>
    /* ── TOKENS ─────────────────────────────────────────────── */
    :root {
      --bg:        #08080a;
      --surface:   rgba(255,255,255,0.06);
      --surface-h: rgba(255,255,255,0.11);
      --border:    rgba(245,241,230,0.10);
      --text:      #f5f1e6;
      --muted:     rgba(245,241,230,0.45);
      --accent:    #ff3b2e;
      --accent-d:  #d42e1f;
      --font-display: 'Splatink', 'Anton', sans-serif;
      --font-body:    'DM Sans', system-ui, sans-serif;
      --radius:    14px;
      --link-h:    64px;
    }

    /* ── RESET ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── FONTS ──────────────────────────────────────────────── */
    @font-face {
      font-family: 'Splatink';
      src: url('/assets/fonts/Splatink.otf') format('opentype');
      font-display: swap;
    }
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');

    /* ── BACKGROUND ─────────────────────────────────────────── */
    .bg-wrap {
      position: fixed; inset: 0; z-index: 0;
      background: var(--bg);
    }
    .bg-img {
      position: absolute; inset: 0;
      background-size: cover;
      background-position: center top;
      opacity: 0.35;
    }
    .bg-overlay {
      position: absolute; inset: 0;
      background: rgba(8,8,10,0.78);
    }
    .bg-grain {
      position: absolute; inset: 0;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* ── LAYOUT ─────────────────────────────────────────────── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 48px 20px 60px;
    }

    /* ── HEADER / AVATAR ────────────────────────────────────── */
    .hub-header {
      display: flex; flex-direction: column; align-items: center;
      gap: 14px;
      margin-bottom: 32px;
      animation: fadeUp 0.6s ease both;
    }
    .hub-avatar {
      width: 88px; height: 88px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border);
      background: var(--surface);
    }
    .hub-avatar-placeholder {
      width: 88px; height: 88px; border-radius: 50%;
      background: var(--surface);
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
    }
    .hub-name {
      font-family: var(--font-display);
      font-size: clamp(2rem, 8vw, 3rem);
      letter-spacing: 0.04em;
      line-height: 1;
      text-align: center;
    }
    .hub-tagline {
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
      max-width: 280px;
      line-height: 1.5;
    }

    /* ── LINK STACK ─────────────────────────────────────────── */
    .link-stack {
      display: flex; flex-direction: column; gap: 10px;
      width: 100%; max-width: 420px;
    }

    /* ── SECTION LABEL ──────────────────────────────────────── */
    .section-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 6px 4px 2px;
      margin-top: 6px;
      animation: fadeUp 0.6s ease both;
    }

    /* ── LINK ITEM ──────────────────────────────────────────── */
    .link-item {
      display: flex; align-items: center;
      min-height: var(--link-h);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0 20px;
      text-decoration: none;
      color: var(--text);
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s, transform 0.18s;
      animation: fadeUp 0.6s ease both;
      position: relative;
      overflow: hidden;
    }
    .link-item::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 60%);
      pointer-events: none;
    }
    .link-item:hover, .link-item:focus-visible {
      background: var(--surface-h);
      border-color: rgba(245,241,230,0.2);
      transform: translateY(-1px);
    }
    .link-item:active { transform: translateY(0); }

    /* accent / featured variant */
    .link-item.featured {
      background: var(--accent);
      border-color: var(--accent);
      color: #08080a;
    }
    .link-item.featured::before {
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
    }
    .link-item.featured:hover {
      background: var(--accent-d);
      border-color: var(--accent-d);
    }
    .link-item.featured .link-icon svg { color: #fff; }
    .link-item.featured .link-label { color: #fff; }
    .link-item.featured .link-sub { color: rgba(255,255,255,0.7); }
    .link-item.featured .link-arrow { color: rgba(255,255,255,0.6); }

    .link-icon {
      width: 36px; height: 36px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      margin-right: 14px;
    }
    .link-icon svg { width: 22px; height: 22px; color: var(--text); }

    .link-text { flex: 1; display: flex; flex-direction: column; gap: 2px; }
    .link-label { font-size: 0.95rem; font-weight: 500; line-height: 1.2; }
    .link-sub { font-size: 0.75rem; color: var(--muted); line-height: 1.2; }

    .link-arrow {
      margin-left: 12px; color: var(--muted);
      flex-shrink: 0;
    }
    .link-arrow svg { width: 16px; height: 16px; }

    /* video thumbnail variant */
    .link-item.has-thumb {
      padding: 0;
      overflow: hidden;
    }
    .link-thumb {
      width: 100px; height: 64px;
      object-fit: cover; flex-shrink: 0;
      border-radius: var(--radius) 0 0 var(--radius);
    }
    .link-item.has-thumb .link-text { padding: 0 4px; }
    .link-item.has-thumb .link-arrow { padding-right: 16px; }

    /* ── ICON ROW (social + stream) ─────────────────────────── */
    .icon-row {
      display: flex; gap: 10px; justify-content: center;
      flex-wrap: wrap;
      width: 100%; max-width: 420px;
      animation: fadeUp 0.6s ease both;
    }
    .icon-btn {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; color: var(--text);
      transition: background 0.18s, border-color 0.18s, transform 0.18s;
    }
    .icon-btn svg { width: 20px; height: 20px; }
    .icon-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      transform: scale(1.08);
    }

    /* ── FOOTER ─────────────────────────────────────────────── */
    .hub-footer {
      margin-top: 40px;
      font-size: 0.72rem;
      color: rgba(245,241,230,0.2);
      letter-spacing: 0.06em;
      animation: fadeUp 0.6s ease both;
    }

    /* ── SKELETON ───────────────────────────────────────────── */
    .skeleton {
      width: 100%; height: var(--link-h);
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
      animation: shimmer 1.4s ease infinite;
    }
    @keyframes shimmer {
      0%,100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    /* ── ANIMATION ──────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── CUSTOM LINK EMBEDS ─────────────────────────────────── */
    .embed-card {
      width: 100%; max-width: 420px;
      border-radius: var(--radius);
      overflow: hidden;
      animation: fadeUp 0.6s ease both;
    }
    /* Video embed */
    .video-embed {
      position: relative;
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
    }
    .video-thumb {
      width: 100%; aspect-ratio: 16/9;
      object-fit: cover; display: block;
      transition: opacity 0.2s;
    }
    .video-embed:hover .video-thumb { opacity: 0.75; }
    .video-play-ring {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .video-play-btn {
      width: 52px; height: 52px; border-radius: 50%;
      background: rgba(8,8,10,0.7);
      border: 2px solid rgba(245,241,230,0.6);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s;
    }
    .video-embed:hover .video-play-btn {
      background: var(--accent);
      border-color: var(--accent);
    }
    .video-play-btn svg { width: 20px; height: 20px; color: #fff; margin-left: 3px; }
    .video-caption {
      font-size: 0.75rem; color: var(--muted);
      padding: 6px 2px 0;
      line-height: 1.4;
    }
    .video-lightbox {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.92);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .video-lightbox.open { opacity: 1; pointer-events: all; }
    .video-lightbox-inner {
      width: 100%; max-width: 720px;
      aspect-ratio: 16/9; position: relative;
    }
    .video-lightbox-inner iframe {
      width: 100%; height: 100%; border: none; border-radius: 8px;
    }
    .video-lightbox-close {
      position: absolute; top: -40px; right: 0;
      background: none; border: none; color: #fff;
      font-size: 1.5rem; cursor: pointer; line-height: 1;
    }
    /* Song/Spotify embed */
    .song-embed iframe {
      border-radius: var(--radius);
      width: 100%;
      border: none;
    }
    .song-caption {
      font-size: 0.75rem; color: var(--muted);
      padding: 6px 2px 0; line-height: 1.4;
    }

    /* ── NEWSLETTER MODAL ───────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(8,8,10,0.85);
      backdrop-filter: blur(8px);
      display: flex; align-items: flex-end; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: #17171a;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 28px 28px;
      width: 100%; max-width: 420px;
      transform: translateY(20px);
      transition: transform 0.25s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal h3 {
      font-family: var(--font-display);
      font-size: 1.6rem; letter-spacing: 0.03em;
      margin-bottom: 6px;
    }
    .modal p { font-size: 0.85rem; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
    .modal input[type="email"] {
      width: 100%; padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.95rem;
      margin-bottom: 10px;
      outline: none;
      transition: border-color 0.15s;
    }
    .modal input:focus { border-color: var(--accent); }
    .modal-submit {
      width: 100%; padding: 15px;
      background: var(--accent);
      color: #08080a;
      border: none; border-radius: 10px;
      font-family: var(--font-body);
      font-size: 0.95rem; font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .modal-submit:hover { background: var(--accent-d); }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: none; border: none;
      color: var(--muted); cursor: pointer; padding: 4px;
    }
    .modal-close svg { width: 20px; height: 20px; }
    .modal-msg { font-size: 0.82rem; text-align: center; margin-top: 10px; min-height: 20px; }
    .modal-msg.ok { color: #6dd67a; }
    .modal-msg.err { color: #e07070; }
  </style>
</head>
<body>

<!-- Background -->
<div class="bg-wrap">
  <div class="bg-img" id="bg-img-a"></div>
  <div class="bg-overlay"></div>
  <div class="bg-grain"></div>
</div>

<!-- Newsletter modal -->
<div class="modal-overlay" id="sub-modal">
  <div class="modal" style="position:relative">
    <button class="modal-close" id="modal-close-btn" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <h3>Stay in the loop</h3>
    <p>New music, shows, and stuff — straight to your inbox. No spam, ever.</p>
    <input type="email" id="sub-email" placeholder="your@email.com" autocomplete="email" />
    <button class="modal-submit" id="sub-submit">Subscribe</button>
    <div class="modal-msg" id="sub-msg"></div>
  </div>
</div>

<!-- Video lightbox -->
<div class="video-lightbox" id="video-lightbox">
  <div class="video-lightbox-inner" id="video-lightbox-inner">
    <button class="video-lightbox-close" id="video-lightbox-close">✕</button>
  </div>
</div>

<!-- Page -->
<div class="page" id="page">

  <!-- Header (populated by JS based on settings) -->
  <div class="hub-header" id="hub-header" style="display:none">
    <div class="hub-avatar-placeholder" id="avatar-wrap" style="display:none">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="rgba(245,241,230,0.2)" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    </div>
    <div class="hub-name" id="hub-name" style="display:none">WD-HAN</div>
    <div class="hub-tagline" id="hub-tagline" style="display:none"></div>
  </div>

  <!-- Link stack (populated by JS) -->
  <div class="link-stack" id="link-stack">
    <div class="skeleton"></div>
    <div class="skeleton" style="height:48px;opacity:0.6"></div>
    <div class="skeleton" style="opacity:0.7"></div>
    <div class="skeleton" style="opacity:0.5"></div>
    <div class="skeleton" style="opacity:0.4"></div>
  </div>

  <div class="hub-footer">wdhan.com</div>
</div>

  return `https://${SANITY_PROJECT}.api.sanity.io/v2021-10-21/data/query/${SANITY_DATASET}?query=${encodeURIComponent(query)}`;
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Streaming platforms config (key matches siteSettings.socials / Sanity streamingLinks)
const STREAM_PLATFORMS = [
  { key: 'spotify',      icon: 'spotify',      label: 'Spotify' },
  { key: 'appleMusic',   icon: 'appleMusic',   label: 'Apple Music' },
  { key: 'youtubeMusic', icon: 'youtubeMusic', label: 'YouTube Music' },
  { key: 'tidal',        icon: 'tidal',        label: 'Tidal' },
  { key: 'amazonMusic',  icon: 'amazonMusic',  label: 'Amazon Music' },
  { key: 'soundcloud',   icon: 'soundcloud',   label: 'SoundCloud' },
  { key: 'deezer',       icon: 'deezer',       label: 'Deezer' },
  { key: 'bandcamp',     icon: 'bandcamp',     label: 'Bandcamp' },
];

const SOCIAL_PLATFORMS = [
  { key: 'instagram', icon: 'instagram' },
  { key: 'tiktok',    icon: 'tiktok' },
  { key: 'youtube',   icon: 'youtube' },
  { key: 'facebook',  icon: 'facebook' },
  { key: 'twitter',   icon: 'twitter' },
];

// ── BACKGROUND ─────────────────────────────────────────────────
const bgA = document.getElementById('bg-img-a');

function setBg(url) {
  bgA.style.backgroundImage = `url(${url})`;
}

// ── RENDER HELPERS ─────────────────────────────────────────────
function makeLink({ href, label, sub, iconName, featured, thumb, onClick }) {
  const el = document.createElement('a');
  el.className = 'link-item' + (featured ? ' featured' : '') + (thumb ? ' has-thumb' : '');
  if (href) { el.href = href; el.target = '_blank'; el.rel = 'noopener'; }
  if (onClick) el.addEventListener('click', (e) => { e.preventDefault(); onClick(); });

  let inner = '';
  if (thumb) {
    inner += `<img class="link-thumb" src="${esc(thumb)}" alt="" loading="lazy" onerror="this.style.display='none'">`;
    inner += `<div class="link-text"><div class="link-label">${esc(label)}</div>${sub ? `<div class="link-sub">${esc(sub)}</div>` : ''}</div>`;
  } else {
    inner += `<div class="link-icon">${ICONS[iconName] || ICONS.link}</div>`;
    inner += `<div class="link-text"><div class="link-label">${esc(label)}</div>${sub ? `<div class="link-sub">${esc(sub)}</div>` : ''}</div>`;
  }
  inner += `<div class="link-arrow">${ICONS.arrow}</div>`;
  el.innerHTML = inner;
  return el;
}

function makeLabel(text) {
  const el = document.createElement('div');
  el.className = 'section-label';
  el.textContent = text;
  return el;
}

function makeIconRow(items) {
  // items: [{ href, icon, label }]
  const row = document.createElement('div');
  row.className = 'icon-row';
  items.forEach(({ href, icon, label }) => {
    if (!href) return;
    const a = document.createElement('a');
    a.className = 'icon-btn';
    a.href = href; a.target = '_blank'; a.rel = 'noopener';
    a.setAttribute('aria-label', label);
    a.innerHTML = ICONS[icon] || ICONS.link;
    row.appendChild(a);
  });
  if (!row.children.length) return null;
  return row;
}

// ── MAIN ───────────────────────────────────────────────────────
async function init() {
  const [settingsRes, releasesRes, videosRes, showsRes, hubRes] = await Promise.allSettled([
    fetch(sanityUrl(`*[_type == "siteSettings"][0]{
      bandName, tagline, bio,
      "avatarUrl": bandLogo.asset->url,
      socials,
      streamingLinks,
      "accentColor": homepageSettings.mainColor,
      "bgImages": *[_type == "galleryImage" && homepageBackground == true][0]{
        "url": image.asset->url
      }
    }`)).then(r => r.json()),
    fetch(sanityUrl(`*[_type == "release" && featured == true] | order(releaseDate desc)[0]{
      title, "slug": slug.current, releaseType, streamingLinks
    }`)).then(r => r.json()),
    fetch(sanityUrl(`*[_type == "video"] | order(publishDate desc)[0]{
      title, embedId, category
    }`)).then(r => r.json()),
    fetch('https://admin-api.wdhan.com/bandsintown').then(r => r.json()).catch(() => []),
    fetch(sanityUrl(`*[_type == "bandHubSettings"][0]`)).then(r => r.json()),
  ]);

  const settings = settingsRes.value?.result || {};
  const release  = releasesRes.value?.result || null;
  const video    = videosRes.value?.result || null;
  const shows    = Array.isArray(showsRes.value) ? showsRes.value : [];
  const hub      = hubRes.value?.result || {};

  // ── Accent color from Sanity ──
  if (settings.accentColor) {
    document.documentElement.style.setProperty('--accent', settings.accentColor);
  }

  // ── Background — first image only ──
  if (settings.bgImages?.url) setBg(settings.bgImages.url);

  // ── Header ──
  const headerEl  = document.getElementById('hub-header');
  const avatarEl  = document.getElementById('avatar-wrap');
  const nameEl    = document.getElementById('hub-name');
  const taglineEl = document.getElementById('hub-tagline');

  const showLogo    = hub.showLogo    !== false;
  const showName    = hub.showName    !== false;
  const showTagline = hub.showTagline !== false;

  const displayName    = hub.headerName    || settings.bandName || 'WD-HAN';
  const displayTagline = hub.headerTagline || settings.tagline  || settings.bio || '';
  const avatarUrl      = settings.avatarUrl;

  let headerVisible = false;

  if (showLogo && avatarUrl) {
    avatarEl.innerHTML = `<img class="hub-avatar" src="${esc(avatarUrl)}" alt="${esc(displayName)}" />`;
    avatarEl.className = '';
    avatarEl.style.display = '';
    headerVisible = true;
  } else if (showLogo) {
    avatarEl.style.display = 'flex';
    headerVisible = true;
  } else {
    avatarEl.style.display = 'none';
  }

  if (showName) {
    nameEl.textContent  = displayName;
    nameEl.style.display = '';
    headerVisible = true;
  } else {
    nameEl.style.display = 'none';
  }

  if (showTagline && displayTagline) {
    taglineEl.textContent  = displayTagline;
    taglineEl.style.display = '';
    headerVisible = true;
  } else {
    taglineEl.style.display = 'none';
  }

  if (headerVisible) headerEl.style.display = '';

  // ── Build ordered section list ──
  // Default order if none saved
  const DEFAULT_ORDER = [
    'featuredRelease', 'music', 'shows', 'stream',
    'video', 'merch', 'subscribe', 'socials', 'customLinks'
  ];

  const sectionOrder = (hub.sectionOrder && hub.sectionOrder.length)
    ? hub.sectionOrder
    : DEFAULT_ORDER;

  const stack = document.getElementById('link-stack');
  stack.innerHTML = '';
  let delay = 0;

  function addEl(el) {
    if (!el) return;
    el.style.animationDelay = `${delay}s`;
    delay += 0.05;
    stack.appendChild(el);
  }

  // Section renderers
  const renderers = {
    featuredRelease() {
      if (hub.showRelease === false) return;
      if (release?.streamingLinks?.spotify || release) {
        const isUpcoming = !release?.streamingLinks?.spotify;
        addEl(makeLink({
          href: release?.streamingLinks?.spotify || 'https://open.spotify.com/artist/2byXGURM0QAhEgdMIWGM5c',
          label: isUpcoming ? `Pre-Save — ${release.title}` : `Listen — ${release.title}`,
          sub: isUpcoming ? 'Save it on Spotify before release' : 'Stream now on Spotify',
          iconName: 'spotify',
          featured: true,
        }));
      } else {
        addEl(makeLink({ href: 'https://open.spotify.com/artist/2byXGURM0QAhEgdMIWGM5c', label: 'Listen on Spotify', iconName: 'spotify', featured: true }));
      }
    },

    music() {
      if (hub.showMusic === false) return;
      addEl(makeLink({
        href: '/music.html',
        label: hub.musicLabel || 'View our full catalog',
        sub: 'Discography & streaming links',
        iconName: 'music',
      }));
    },

    shows() {
      if (hub.showShows === false) return;
      if (!shows.length) return;
      addEl(makeLabel('SHOWS'));
      const next = shows[0];
      const dateStr = next.datetime
        ? new Date(next.datetime).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
        : '';
      const venue = next.venue?.name || '';
      addEl(makeLink({
        href: next.url || '/shows.html',
        label: `${dateStr}${venue ? ' — ' + venue : ''}`,
        sub: next.venue?.city ? `${next.venue.city}, ${next.venue.country || ''}`.trim().replace(/,$/, '') : 'Get tickets',
        iconName: 'ticket',
      }));
      if (shows.length > 1) {
        addEl(makeLink({ href: '/shows.html', label: `View all ${shows.length} shows`, iconName: 'ticket' }));
      }
    },

    stream() {
      if (hub.showStream === false) return;
      // Build list of visible platforms
      const hiddenStream = hub.hiddenStreamPlatforms || [];
      const streamLinks  = settings.streamingLinks || settings.socials || {};
      const items = STREAM_PLATFORMS
        .filter(p => !hiddenStream.includes(p.key))
        .map(p => ({
          href:  streamLinks[p.key] || null,
          icon:  p.icon,
          label: p.label,
        }))
        .filter(p => p.href);
      if (!items.length) return;
      addEl(makeLabel('STREAM'));
      const row = makeIconRow(items);
      addEl(row);
    },

    video() {
      if (hub.showVideo === false) return;
      if (!video?.embedId) return;
      addEl(makeLabel('LATEST VIDEO'));
      addEl(makeLink({
        href: `https://www.youtube.com/watch?v=${video.embedId}`,
        label: video.title || 'Watch on YouTube',
        sub: video.category || 'YouTube',
        thumb: `https://img.youtube.com/vi/${video.embedId}/mqdefault.jpg`,
      }));
    },

    merch() {
      if (hub.showMerch === false) return;
      addEl(makeLabel('MERCH & MORE'));
      addEl(makeLink({
        href: hub.merchUrl || 'https://wd-han.myshopify.com',
        label: hub.merchLabel || 'Merch Store',
        sub: 'Tees, vinyl & more',
        iconName: 'shirt',
      }));
    },

    subscribe() {
      if (hub.showSubscribe === false) return;
      addEl(makeLink({
        label: hub.subscribeLabel || 'Join the Mailing List',
        sub: 'New music & exclusive updates',
        iconName: 'mail',
        onClick: openModal,
      }));
    },

    socials() {
      if (hub.showSocials === false) return;
      const socials = settings.socials || {};
      const items = SOCIAL_PLATFORMS
        .map(p => ({ href: socials[p.key], icon: p.icon, label: p.key }))
        .filter(p => p.href);
      if (!items.length) return;
      addEl(makeLabel('FOLLOW'));
      const row = makeIconRow(items);
      addEl(row);
    },

    // Custom links are handled inline below via sectionOrder
    customLinks() {},
  };

  // Build a map of custom links by id for fast lookup
  const customLinksMap = hub.customLinksMap || {};
  // Also support legacy ordered array
  const customLinksOrdered = hub.customLinksOrdered || [];
  // Merge: keyed map is authoritative, ordered list as fallback
  const clById = { ...customLinksMap };
  customLinksOrdered.forEach(cl => { if (cl.id && !clById[cl.id]) clById[cl.id] = cl; });

  // Render in saved order
  sectionOrder.forEach(key => {
    if (key.startsWith('customLink:')) {
      const id   = key.slice('customLink:'.length);
      const data = clById[id];
      if (!data) return;
      renderCustomLinkItem(data, addEl, delay);
    } else if (renderers[key]) {
      renderers[key]();
    }
  });
}

function renderCustomLinkItem(data, addEl, _delay) {
  const type = data.type || 'link';

  if (type === 'link') {
    addEl(makeLink({
      href: data.url || '#',
      label: data.label || data.url || '',
      iconName: data.icon || 'link',
    }));
    return;
  }

  if (type === 'video' && data.videoId) {
    const wrap = document.createElement('div');
    wrap.className = 'embed-card';
    wrap.style.animationDelay = `${_delay}s`;
    wrap.innerHTML = `
      <div class="video-embed" data-vid="${esc(data.videoId)}">
        <img class="video-thumb"
          src="https://img.youtube.com/vi/${esc(data.videoId)}/mqdefault.jpg"
          alt="${esc(data.caption || '')}"
          onerror="this.src='https://img.youtube.com/vi/${esc(data.videoId)}/hqdefault.jpg'">
        <div class="video-play-ring">
          <div class="video-play-btn">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 4.5v15l13-7.5z"/></svg>
          </div>
        </div>
      </div>
      ${data.caption ? `<div class="video-caption">${esc(data.caption)}</div>` : ''}`;

    wrap.querySelector('.video-embed').addEventListener('click', () => {
      openVideoLightbox(data.videoId);
    });
    const stack = document.getElementById('link-stack');
    wrap.style.animationDelay = `0s`;
    stack.appendChild(wrap);
    return;
  }

  if (type === 'song' && data.embedUri) {
    // embedUri is "track/ID" or "album/ID" or "playlist/ID"
    const compact = data.embedUri.startsWith('track/');
    const height  = compact ? 152 : 232;
    const wrap = document.createElement('div');
    wrap.className = 'embed-card';
    wrap.innerHTML = `
      <div class="song-embed">
        <iframe
          src="https://open.spotify.com/embed/${esc(data.embedUri)}?utm_source=generator&theme=0"
          height="${height}"
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
          loading="lazy">
        </iframe>
      </div>
      ${data.caption ? `<div class="song-caption">${esc(data.caption)}</div>` : ''}`;
    const stack = document.getElementById('link-stack');
    stack.appendChild(wrap);
  }
}

// ── VIDEO LIGHTBOX ─────────────────────────────────────────────
function openVideoLightbox(videoId) {
  const lb    = document.getElementById('video-lightbox');
  const inner = document.getElementById('video-lightbox-inner');
  // Remove any previous iframe
  const old = inner.querySelector('iframe');
  if (old) old.remove();
  const iframe = document.createElement('iframe');
  iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
  iframe.allow = 'autoplay; encrypted-media; fullscreen';
  inner.appendChild(iframe);
  lb.classList.add('open');
}
document.getElementById('video-lightbox-close').addEventListener('click', () => {
  const lb    = document.getElementById('video-lightbox');
  const inner = document.getElementById('video-lightbox-inner');
  const iframe = inner.querySelector('iframe');
  if (iframe) iframe.remove();
  lb.classList.remove('open');
});
document.getElementById('video-lightbox').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) {
    const iframe = document.getElementById('video-lightbox-inner').querySelector('iframe');
    if (iframe) iframe.remove();
    e.currentTarget.classList.remove('open');
  }
});

// ── MODAL ──────────────────────────────────────────────────────
function openModal() {
  document.getElementById('sub-modal').classList.add('open');
}
document.getElementById('modal-close-btn').addEventListener('click', () => {
  document.getElementById('sub-modal').classList.remove('open');
});
document.getElementById('sub-modal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});
document.getElementById('sub-submit').addEventListener('click', async () => {
  const email = document.getElementById('sub-email').value.trim();
  const msg   = document.getElementById('sub-msg');
  if (!email || !email.includes('@')) {
    msg.textContent = 'Please enter a valid email.';
    msg.className = 'modal-msg err';
    return;
  }
  msg.textContent = 'Subscribing…'; msg.className = 'modal-msg';
  try {
    const res = await fetch('https://admin-api.wdhan.com/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    const data = await res.json();
    if (data.success) {
      msg.textContent = "You're in! 🎉"; msg.className = 'modal-msg ok';
      document.getElementById('sub-email').value = '';
      setTimeout(() => document.getElementById('sub-modal').classList.remove('open'), 2000);
    } else {
      throw new Error(data.error || 'Subscribe failed');
    }
  } catch (err) {
    msg.textContent = 'Something went wrong — try again.'; msg.className = 'modal-msg err';
  }
});

init().catch(console.error);
</script>
