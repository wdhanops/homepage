<!DOCTYPE html>
<html lang="en" data-theme="midnight">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg" />
<link rel="apple-touch-icon" href="/assets/img/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WD-HAN</title><!-- filled by JS -->
  <meta name="description" content="" /><!-- filled by JS -->

  <link rel="stylesheet" href="/assets/css/nav.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    @font-face {
      font-family: 'Splatink';
      src: url('/assets/fonts/Splatink.otf') format('opentype');
      font-display: swap;
    }

    :root {
      --accent:#ff3b2e; --accent-ink:#0a0a0a;
      --maxw:1240px; --ease:cubic-bezier(.22,.61,.36,1);
      --font-display:'Splatink',"Anton",sans-serif;
      --bg:#08080a; --bg2:#101014;
      --ink:#f5f1e6; --muted:rgba(245,241,230,.55); --faint:rgba(245,241,230,.32);
      --line:rgba(245,241,230,.14); --card:rgba(245,241,230,.045); --card-line:rgba(245,241,230,.10);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--ink);font-family:"Space Grotesk",system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
    img{display:block;max-width:100%;}
    a{color:inherit;text-decoration:none;}
    button{font-family:inherit;cursor:pointer;}
    ::selection{background:var(--accent);color:var(--accent-ink);}
    .wrap{max-width:var(--maxw);margin:0 auto;padding:0 28px;}

    /* ── Track hero ── */
    .track-hero{position:relative;z-index:2;padding:110px 0 72px;}
    .hero-blur-bg{
      position:absolute;inset:0;z-index:0;
      background-size:cover;background-position:center;
      filter:blur(70px) brightness(.2) saturate(.6);
      transform:scale(1.15);
    }
    .hero-blur-bg::after{
      content:"";position:absolute;inset:0;
      background:linear-gradient(to bottom,rgba(8,8,10,.3) 0%,var(--bg) 90%);
    }
    .hero-content{position:relative;z-index:2;}

    /* Breadcrumb */
    .breadcrumb{
      display:flex;align-items:center;gap:8px;
      font-family:"Space Mono";font-size:10px;letter-spacing:.22em;text-transform:uppercase;
      color:var(--faint);margin-bottom:24px;
    }
    .breadcrumb a{color:var(--faint);transition:color .18s;}
    .breadcrumb a:hover{color:var(--accent);}
    .breadcrumb span{opacity:.5;}

    /* Layout */
    .hero-grid{display:grid;grid-template-columns:300px 1fr;gap:52px;align-items:start;}

    /* Artwork */
    .track-artwork{
      position:relative;border-radius:14px;overflow:hidden;
      box-shadow:0 30px 60px rgba(0,0,0,.55);
      aspect-ratio:1;background:var(--card);flex-shrink:0;
    }
    .track-artwork img{width:100%;height:100%;object-fit:cover;display:block;}
    .artwork-ph{
      width:100%;height:100%;
      background:repeating-linear-gradient(45deg,color-mix(in srgb,var(--ink) 7%,transparent) 0 2px,transparent 2px 12px),color-mix(in srgb,var(--ink) 5%,transparent);
      display:flex;align-items:center;justify-content:center;
    }
    .artwork-ph span{font-family:"Space Mono";font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);}
    .track-num-badge{
      position:absolute;top:12px;left:12px;
      font-family:"Space Mono";font-size:10px;letter-spacing:.18em;text-transform:uppercase;
      background:rgba(8,8,10,.8);backdrop-filter:blur(6px);
      color:var(--faint);padding:5px 10px;border-radius:100px;border:1px solid var(--line);
    }

    /* Meta */
    .track-meta{padding-top:4px;}
    .track-release-label{
      font-family:"Space Mono";font-size:10px;letter-spacing:.26em;text-transform:uppercase;
      color:var(--faint);margin-bottom:10px;
    }
    .track-release-label a{color:var(--accent);transition:color .18s;}
    .track-release-label a:hover{color:color-mix(in srgb,var(--accent) 80%,white);}
    .track-title{
      font-family:var(--font-display);
      font-size:clamp(44px,6.5vw,96px);
      line-height:.88;text-transform:uppercase;letter-spacing:.01em;margin-bottom:12px;
    }
    .track-credits{font-family:"Space Mono";font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:8px;}
    .track-duration{font-family:"Space Mono";font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);margin-bottom:28px;}

    /* Spotify embed */
    .spotify-embed{border-radius:12px;overflow:hidden;margin-bottom:24px;background:var(--card);}
    .spotify-embed iframe{width:100%;height:80px;border:none;display:block;}

    /* Streaming links */
    .streaming-label{font-family:"Space Mono";font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--faint);margin-bottom:12px;}
    .streaming-links{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px;}
    .slink{
      display:inline-flex;align-items:center;gap:6px;
      padding:9px 16px;border-radius:100px;border:1px solid var(--card-line);
      font-family:"Space Mono";font-size:10px;letter-spacing:.12em;text-transform:uppercase;
      color:var(--muted);transition:all .18s var(--ease);white-space:nowrap;
    }
    .slink svg{width:14px;height:14px;flex-shrink:0;}
    .slink:hover{border-color:var(--accent);color:var(--accent);}
    .slink.primary{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);}
    .slink.primary:hover{background:color-mix(in srgb,var(--accent) 85%,white);}

    /* Tags */
    .tags-row{display:flex;flex-wrap:wrap;gap:7px;}
    .tag{
      display:inline-block;font-family:"Space Mono";font-size:9px;letter-spacing:.18em;text-transform:uppercase;
      background:var(--card);border:1px solid var(--card-line);color:var(--faint);
      padding:5px 11px;border-radius:100px;
    }
    .tag.mood{border-color:color-mix(in srgb,var(--accent) 30%,transparent);color:color-mix(in srgb,var(--accent) 70%,var(--faint));}

    /* ── Content sections ── */
    .content-section{position:relative;z-index:2;padding:64px 0;}
    .content-section + .content-section{border-top:1px solid var(--line);}
    .section-heading{
      font-family:var(--font-display);font-size:clamp(30px,4vw,54px);
      line-height:.92;text-transform:uppercase;margin-bottom:32px;
    }
    .section-heading em{color:var(--accent);font-style:normal;}

    /* Lyrics */
    .lyrics-block{
      position:relative;border-left:2px solid var(--accent);
      padding:4px 0 4px 28px;max-width:52ch;
    }
    .lyrics-text{font-family:"Space Mono";font-size:15px;line-height:1.9;color:var(--muted);white-space:pre-wrap;}
    .lyrics-fade{
      position:absolute;bottom:0;left:0;right:0;height:60px;
      background:linear-gradient(transparent,var(--bg));pointer-events:none;
    }

    /* Release card */
    .release-card{
      display:flex;align-items:center;gap:20px;
      padding:20px 22px;border:1px solid var(--card-line);border-radius:16px;background:var(--card);
      max-width:480px;transition:border-color .2s var(--ease),transform .2s var(--ease);
    }
    .release-card:hover{border-color:var(--accent);transform:translateY(-2px);}
    .rc-art{width:72px;height:72px;border-radius:10px;overflow:hidden;flex-shrink:0;background:var(--card-line);}
    .rc-art img{width:100%;height:100%;object-fit:cover;}
    .rc-type{font-family:"Space Mono";font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--faint);margin-bottom:4px;}
    .rc-title{font-weight:700;font-size:17px;color:var(--ink);}
    .rc-year{font-family:"Space Mono";font-size:10px;letter-spacing:.12em;color:var(--faint);margin-top:3px;}
    .rc-arrow{margin-left:auto;flex-shrink:0;color:var(--faint);transition:color .2s,transform .2s;}
    .release-card:hover .rc-arrow{color:var(--accent);transform:translate(3px,-3px);}

    /* Videos grid */
    .videos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
    .vcard{
      border:1px solid var(--card-line);border-radius:14px;overflow:hidden;
      background:var(--bg2);cursor:pointer;
      transition:transform .25s var(--ease),border-color .25s;
    }
    .vcard:hover{transform:translateY(-4px);border-color:var(--accent);}
    .vthumb{position:relative;padding-top:56.25%;overflow:hidden;background:var(--card);}
    .vthumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .5s var(--ease),filter .3s;filter:brightness(.85);}
    .vcard:hover .vthumb img{transform:scale(1.04);filter:brightness(.55);}
    .vthumb-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.2);opacity:0;transition:opacity .2s;}
    .vcard:hover .vthumb-overlay{opacity:1;}
    .vplay-ring{width:50px;height:50px;border-radius:50%;border:2px solid white;display:flex;align-items:center;justify-content:center;transition:background .2s,border-color .2s;}
    .vcard:hover .vplay-ring{background:var(--accent);border-color:var(--accent);}
    .vplay-ring svg{width:16px;height:16px;fill:white;margin-left:2px;}
    .vcard-body{padding:13px 15px;}
    .vcat{font-family:"Space Mono";font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-bottom:4px;}
    .vtitle{font-weight:700;font-size:14px;line-height:1.3;}

    /* Lightbox */
    .lightbox{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.95);backdrop-filter:blur(12px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s var(--ease);}
    .lightbox.open{opacity:1;pointer-events:auto;}
    .lb-inner{position:relative;width:100%;max-width:960px;transform:scale(.97);transition:transform .35s var(--ease);}
    .lightbox.open .lb-inner{transform:none;}
    .lb-frame{width:100%;aspect-ratio:16/9;border-radius:12px;overflow:hidden;background:#000;box-shadow:0 40px 100px rgba(0,0,0,.8);}
    .lb-frame iframe{width:100%;height:100%;border:none;display:block;}
    .lb-meta{display:flex;align-items:center;justify-content:space-between;gap:20px;margin-top:16px;}
    .lb-title{font-family:var(--font-display);font-size:clamp(18px,2.5vw,28px);text-transform:uppercase;line-height:.95;}
    .lb-close{background:none;border:1px solid var(--card-line);color:var(--muted);width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0;}
    .lb-close:hover{background:var(--accent);border-color:var(--accent);color:var(--accent-ink);}
    .lb-close svg{width:16px;height:16px;}

    /* Skeleton */
    @keyframes shimmer{0%,100%{opacity:.3;}50%{opacity:.7;}}
    .sk{background:var(--card-line);border-radius:8px;animation:shimmer 1.6s ease-in-out infinite;}

    /* Not found */
    .not-found{text-align:center;padding:120px 24px;display:flex;flex-direction:column;align-items:center;gap:16px;}
    .not-found h2{font-family:var(--font-display);font-size:clamp(40px,8vw,80px);text-transform:uppercase;}
    .not-found p{color:var(--muted);font-size:16px;}

    /* Footer */
    .foot{position:relative;z-index:2;padding:56px 0 36px;border-top:1px solid var(--line);margin-top:24px;}
    .foot-inner{display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;}
    .foot-wordmark{font-family:var(--font-display);font-size:22px;letter-spacing:.04em;}
    .foot-copy{font-family:"Space Mono";font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);}
    .foot-links{display:flex;gap:24px;}
    .foot-links a{
      font-family:"Space Mono";font-size:11px;letter-spacing:.18em;text-transform:uppercase;
      color:var(--muted);border-bottom:1px solid var(--line);padding-bottom:1px;
      transition:color .2s,border-color .2s;
    }
    .foot-links a:hover{color:var(--accent);border-color:var(--accent);}

    /* Reveal */
    .reveal{opacity:0;transform:translateY(20px);transition:opacity .65s var(--ease),transform .65s var(--ease);}
    .reveal.in{opacity:1;transform:none;}

    /* Responsive */
    @media(max-width:900px){
      .hero-grid{grid-template-columns:1fr;gap:28px;}
      .track-artwork{max-width:240px;}
    }
    @media(max-width:560px){
      .wrap{padding:0 18px;}
      .track-title{font-size:clamp(36px,12vw,64px);}
      .videos-grid{grid-template-columns:1fr;}
    }
  </style>
</head>

<!-- nav.js injects the nav here -->

<!-- ── Content ── -->

          <div class="sk" style="height:70px;width:65%;border-radius:8px;"></div>
          <div class="sk" style="height:12px;width:180px;border-radius:6px;"></div>
          <div class="sk" style="height:80px;width:100%;border-radius:12px;margin-top:8px;"></div>

      </div>
    </div>

</div>

<!-- ── Lightbox ── -->

    <div class="lb-frame">

    <div class="lb-meta">
      <div class="lb-title" id="lb-title"></div>
      <button class="lb-close" id="lb-close" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ── Footer ── -->
<footer class="foot" id="foot" style="display:none;">
  <div class="wrap">
    <div class="foot-inner">
      <div>
        <div class="foot-wordmark">WD-HAN</div>
        <div class="foot-copy" style="margin-top:6px;">© 2026 · All rights reserved</div>
      </div>
      <div class="foot-links" id="foot-links">
        <a href="/music.html">← All Music</a>
        <a href="/">Home</a>
      </div>
    </div>
  </div>
</footer>

    soundcloud:  `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M1.175 12.225c-.015.108-.023.215-.023.33 0 .118.008.226.023.332l-.003-.014c0 .114.005.224.015.332-.01.108-.015.218-.015.332 0 .114.005.226.015.33-.01.108-.015.224-.015.338 0 1.118.906 2.024 2.024 2.024.118 0 .234-.01.347-.03l-.012.002h11.39c.906 0 1.639-.733 1.639-1.638V9.748c0-.906-.733-1.639-1.639-1.639-.234 0-.454.05-.656.14l.01-.004c-.434-2.38-2.507-4.181-5.009-4.181-1.657 0-3.138.796-4.075 2.028l-.009.012c-.07-.01-.14-.016-.213-.016-.906 0-1.639.733-1.639 1.639 0 .046.002.091.005.136l-.001-.006c-.474.14-.88.426-1.174.806l-.004.005z"/></svg>`,
    bandcamp:    `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M0 18.75l7.437-13.5H24l-7.438 13.5z"/></svg>`,
    youtubeMusic:`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.376 0 0 5.376 0 12s5.376 12 12 12 12-5.376 12-12S18.624 0 12 0zm0 19.104c-3.924 0-7.104-3.18-7.104-7.104S8.076 4.896 12 4.896s7.104 3.18 7.104 7.104-3.18 7.104-7.104 7.104zm0-13.332c-3.432 0-6.228 2.796-6.228 6.228S8.568 18.228 12 18.228s6.228-2.796 6.228-6.228S15.432 5.772 12 5.772zM9.684 15.54V8.46L16.2 12l-6.516 3.54z"/></svg>`,
    deezer:      `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.81 11.81h2.7v1.35h-2.7zm0 2.7h2.7v1.35h-2.7zm0-5.4h2.7v1.35h-2.7zm-3.6 5.4h2.7v1.35h-2.7zm0 2.7h2.7V18.6h-2.7zm0-5.4h2.7v1.35h-2.7zm0-2.7h2.7v1.35h-2.7zm-3.6 8.1h2.7V18.6h-2.7zm0-2.7h2.7v1.35h-2.7zm0-2.7h2.7v1.35h-2.7zm-3.6 5.4h2.7V18.6H8.01zm0-2.7h2.7v1.35H8.01zm-3.6 2.7h2.7V18.6H4.41zm0-2.7h2.7v1.35H4.41z"/></svg>`,
  };

  function renderStreamingLinks(links) {
    if (!links) return '';
    const order  = ['spotify','appleMusic','youtube','youtubeMusic','tidal','amazonMusic','deezer','soundcloud','bandcamp'];
    const labels = {spotify:'Spotify',appleMusic:'Apple Music',youtube:'YouTube',youtubeMusic:'YT Music',tidal:'Tidal',amazonMusic:'Amazon',deezer:'Deezer',soundcloud:'SoundCloud',bandcamp:'Bandcamp'};
    return order.filter(k => links[k]).map((k, i) =>
      `<a class="slink${i === 0 ? ' primary' : ''}" href="${esc(links[k])}" target="_blank" rel="noopener">${ICONS[k]||''}${labels[k]}</a>`
    ).join('');
  }

  /* ── Scroll reveal ── */
  const revIO = new IntersectionObserver(entries =>
    entries.forEach(en => { if (en.isIntersecting) { en.target.classList.add('in'); revIO.unobserve(en.target); } }),
    { threshold: 0.07 }
  );
  function observe() { document.querySelectorAll('.reveal:not(.in)').forEach(el => revIO.observe(el)); }

  /* ── Lightbox ── */
  function openLightbox(vid, title) {
    const lb = document.getElementById('lightbox');
    document.getElementById('lb-iframe').src = `https://www.youtube.com/embed/${vid}?autoplay=1&rel=0`;
    document.getElementById('lb-title').textContent = title || '';
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
    setTimeout(() => { document.getElementById('lb-iframe').src = ''; }, 320);
  }
  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lightbox').addEventListener('click', e => { if (e.target === document.getElementById('lightbox')) closeLightbox(); });
  window.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

  /* ── Fetch ── */
  const slug = new URLSearchParams(window.location.search).get('slug');
  if (!slug) { showNotFound(); } else { fetchTrack(slug); }

  async function fetchTrack(slug) {
    const query = `*[_type == "track" && slug.current == $slug][0] {
      title, "slug": slug.current, trackNumber, duration, isrc,
      composerCredits, lyricsExcerpt, streamingLinks, syncMeta,
      "parentRelease": parentRelease->{
        title, "slug": slug.current, releaseType, releaseDate,
        "artworkUrl": artwork.asset->url, streamingLinks
      },
      "videos": *[_type == "video" && relatedTrack._ref == ^._id] | order(publishDate desc) {
        title, youtubeUrl, "embedId": coalesce(embedId, null), category, publishDate
      }
    }`;

    const url = `https://${SANITY_PROJECT_ID}.api.sanity.io/v2021-10-21/data/query/${SANITY_DATASET}`
      + `?query=${encodeURIComponent(query)}&$slug=${encodeURIComponent(JSON.stringify(slug))}`;

    let track;
    try {
      const res = await fetch(url);
      const { result } = await res.json();
      track = result;
    } catch(err) {
      console.warn('Fetch failed', err);
      showNotFound();
      return;
    }

    if (!track) { showNotFound(); return; }

    if (track.videos) {
      track.videos = track.videos
        .map(v => ({ ...v, _vid: v.embedId || ytId(v.youtubeUrl) }))
        .filter(v => v._vid);
    }

    renderPage(track);
  }

  function renderPage(t) {
    document.title = `${t.title} — WD-HAN`;
    document.querySelector('meta[name="description"]').content =
      `${t.title} by WD-HAN${t.parentRelease ? ` from ${t.parentRelease.title}` : ''}. Stream now.`;

    const rel     = t.parentRelease;
    const relSlug = rel?.slug || '';
    const artUrl  = rel?.artworkUrl ? `${rel.artworkUrl}?w=600&auto=format&fit=crop` : null;
    const relYear = rel?.releaseDate ? new Date(rel.releaseDate).getFullYear() : '';
    const relType = rel?.releaseType ? rel.releaseType.toUpperCase() : '';

    const spUrl = t.streamingLinks?.spotify || rel?.streamingLinks?.spotify;
    const spSrc = (() => {
      const s = spotifyId(spUrl);
      if (!s) return null;
      return `https://open.spotify.com/embed/${s.type}/${s.id}?utm_source=generator&theme=0`;
    })();

    const moodTags  = t.syncMeta?.moodTags  || [];
    const genreTags = t.syncMeta?.genreTags  || [];
    const allTags   = [
      ...moodTags.map(tag  => `<span class="tag mood">${esc(tag)}</span>`),
      ...genreTags.map(tag => `<span class="tag">${esc(tag)}</span>`),
      ...(t.syncMeta?.bpm        ? [`<span class="tag">${esc(String(t.syncMeta.bpm))} BPM</span>`] : []),
      ...(t.syncMeta?.musicalKey ? [`<span class="tag">${esc(t.syncMeta.musicalKey)}</span>`] : []),
    ].join('');

    const html = `
      <div class="track-hero">
        ${artUrl ? `<div class="hero-blur-bg" style="background-image:url('${artUrl}')"></div>` : ''}
        <div class="hero-content">
          <div class="wrap">
            ${rel ? `
            <div class="breadcrumb">
              <a href="/music.html">Music</a>
              <span>›</span>
              <a href="/release/?slug=${esc(relSlug)}">${esc(rel.title)}</a>
              <span>›</span>
              <span style="color:var(--muted)">${esc(t.title)}</span>
            </div>` : ''}

            <div class="hero-grid">
              <div class="track-artwork reveal">
                ${artUrl
                  ? `<img src="${artUrl}" alt="${esc(rel?.title || t.title)}" loading="eager">`
                  : `<div class="artwork-ph"><span>${esc(t.title)}</span></div>`}
                ${t.trackNumber ? `<div class="track-num-badge">Track ${t.trackNumber}</div>` : ''}
              </div>

              <div class="track-meta reveal">
                ${rel ? `<div class="track-release-label">From <a href="/release/?slug=${esc(relSlug)}">${esc(rel.title)}</a></div>` : ''}
                <h1 class="track-title">${esc(t.title)}</h1>
                ${t.composerCredits ? `<div class="track-credits">${esc(t.composerCredits)}</div>` : ''}
                ${t.duration ? `<div class="track-duration">${esc(t.duration)}</div>` : ''}

                ${spSrc ? `
                <div class="spotify-embed">
                  <iframe src="${esc(spSrc)}"
                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                    loading="lazy" title="Play ${esc(t.title)}"></iframe>
                </div>` : ''}

                <div class="streaming-label">Stream &amp; Save</div>
                <div class="streaming-links">
                  ${renderStreamingLinks(t.streamingLinks) || renderStreamingLinks(rel?.streamingLinks) || ''}
                </div>

                ${allTags ? `<div class="tags-row">${allTags}</div>` : ''}
              </div>
            </div>
          </div>
        </div>
      </div>

      <div style="height:1px;background:var(--line);"></div>

      ${t.lyricsExcerpt ? `
      <section class="content-section">
        <div class="wrap">
          <h2 class="section-heading reveal"><em>Lyrics</em></h2>
          <div class="lyrics-block reveal">
            <div class="lyrics-text">${esc(t.lyricsExcerpt)}</div>
            <div class="lyrics-fade"></div>
          </div>
        </div>
      </section>` : ''}

      ${rel ? `
      <section class="content-section">
        <div class="wrap">
          <h2 class="section-heading reveal">From the <em>release</em></h2>
          <a class="release-card reveal" href="/release/?slug=${esc(relSlug)}">
            <div class="rc-art">
              ${artUrl ? `<img src="${artUrl}" alt="${esc(rel.title)}" loading="lazy">` : ''}
            </div>
            <div class="rc-info">
              <div class="rc-type">${esc(relType)}</div>
              <div class="rc-title">${esc(rel.title)}</div>
              <div class="rc-year">${relYear}</div>
            </div>
            <div class="rc-arrow">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M7 17 17 7M9 7h8v8"/></svg>
            </div>
          </a>
        </div>
      </section>` : ''}

      ${t.videos?.length ? `
      <section class="content-section">
        <div class="wrap">
          <h2 class="section-heading reveal"><em>Videos</em></h2>
          <div class="videos-grid">
            ${t.videos.map(v => {
              const thumb    = ytThumb(v._vid);
              const fallback = `https://img.youtube.com/vi/${v._vid}/hqdefault.jpg`;
              return `
                <div class="vcard reveal" data-vid="${esc(v._vid)}" data-title="${esc(v.title)}">
                  <div class="vthumb">
                    <img src="${esc(thumb)}" alt="${esc(v.title)}" loading="lazy" onerror="this.src='${esc(fallback)}'">
                    <div class="vthumb-overlay"><div class="vplay-ring"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 4.5v15l13-7.5z"/></svg></div></div>
                  </div>
                  <div class="vcard-body">
                    <div class="vcat">${esc(catLabel(v.category))}</div>
                    <div class="vtitle">${esc(v.title)}</div>
                  </div>
                </div>`;
            }).join('')}
          </div>
        </div>
      </section>` : ''}
    `;

    document.getElementById('page-content').innerHTML = html;
    document.getElementById('foot').style.display = '';

    if (rel) {
      document.getElementById('foot-links').innerHTML = `
        <a href="/release/?slug=${esc(relSlug)}">← ${esc(rel.title)}</a>
        <a href="/music.html">All Music</a>`;
    }

    setTimeout(observe, 80);

    document.querySelectorAll('.vcard[data-vid]').forEach(card => {
      card.addEventListener('click', () => openLightbox(card.dataset.vid, card.dataset.title));
    });
  }

  function showNotFound() {
    document.getElementById('page-content').innerHTML = `
      <div class="not-found" style="padding-top:120px;">
        <h2>Not Found</h2>
        <p>This track doesn't exist or has been removed.</p>
        <a href="/music.html" style="color:var(--accent);font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.2em;text-transform:uppercase;">← Back to Music</a>
      </div>`;
    document.getElementById('foot').style.display = '';
  }
</script>

<script src="/assets/js/nav.js"></script>
</body>
</html>
