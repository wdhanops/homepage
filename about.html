<!DOCTYPE html>
<html lang="en" data-theme="midnight">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg" />
  <link rel="apple-touch-icon" href="/assets/img/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Band — WD-HAN</title>
  <meta name="description" content="Meet WD-HAN — the people behind the music." />

  <link rel="stylesheet" href="/assets/css/nav.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    @font-face {
      font-family: 'Splatink';
      src: url('/assets/fonts/Splatink.otf') format('opentype');
      font-display: swap;
    }

    /* ── Tokens — identical to videos.html ── */
    :root {
      --accent:     #ff3b2e;
      --accent-ink: #0a0a0a;
      --maxw:       1240px;
      --ease:       cubic-bezier(.22,.61,.36,1);
      --font-display: 'Splatink', "Anton", sans-serif;
      --bg:  #08080a; --bg2: #101014;
      --ink: #f5f1e6;
      --muted: rgba(245,241,230,.55);
      --faint: rgba(245,241,230,.32);
      --line: rgba(245,241,230,.14);
      --card: rgba(245,241,230,.045);
      --card-line: rgba(245,241,230,.10);
      --blob-op: .32;
    }

    /* ── Reset ── */
    *{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--ink);font-family:"Space Grotesk",system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
    a{color:inherit;text-decoration:none;}
    button{font-family:inherit;cursor:pointer;}
    ::selection{background:var(--accent);color:var(--accent-ink);}
    .wrap{max-width:var(--maxw);margin:0 auto;padding:0 28px;}

    /* ── Glow — identical to videos.html ── */
    .glow-field{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:var(--blob-op);mix-blend-mode:screen;contain:strict;}
    .glow{position:absolute;border-radius:50%;background:radial-gradient(circle at 50% 50%,var(--accent) 0%,color-mix(in srgb,var(--accent) 55%,transparent) 36%,transparent 68%);}
    @keyframes g1{0%,100%{transform:translate(0,0);}50%{transform:translate(80px,50px);}}
    @keyframes g2{0%,100%{transform:translate(0,0);}50%{transform:translate(-60px,-80px);}}
    .g1{width:600px;height:600px;top:-15%;left:-10%;animation:g1 20s ease-in-out infinite;}
    .g2{width:400px;height:400px;top:55%;left:70%;animation:g2 24s ease-in-out infinite;}
    @media(prefers-reduced-motion:reduce){.glow{animation:none!important;}}

    /* ══════════════════════════════════════
       PAGE HERO — identical pattern to videos.html
    ══════════════════════════════════════ */
    .page-hero{
      position:relative;z-index:2;
      min-height:60vh;display:flex;align-items:flex-end;
      padding:0;overflow:hidden;
      border-bottom:1px solid var(--line);
    }
    .hero-bg{
      position:absolute;inset:0;z-index:0;
      background-size:cover;background-position:center top;
      filter:brightness(.3) saturate(.7);
      transition:background-image .5s;
    }
    .hero-bg::after{
      content:"";position:absolute;inset:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity:.5;pointer-events:none;
    }
    .hero-grad{
      position:absolute;inset:0;z-index:1;
      background:linear-gradient(to top,var(--bg) 0%,rgba(8,8,10,.6) 40%,rgba(8,8,10,.15) 70%,transparent 100%);
    }
    .hero-grad-left{
      position:absolute;inset:0;z-index:1;
      background:linear-gradient(to right,rgba(8,8,10,.7) 0%,transparent 60%);
    }
    .hero-content{
      position:relative;z-index:3;
      width:100%;padding:130px 0 56px;
    }
    .hero-content .wrap{display:flex;flex-direction:column;gap:0;}
    .hero-eyebrow{
      font-family:"Space Mono";font-size:10px;letter-spacing:.36em;text-transform:uppercase;
      color:var(--accent);margin-bottom:16px;
      display:flex;align-items:center;gap:10px;
    }
    .hero-eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);}
    .hero-h1{
      font-family:var(--font-display);
      font-size:clamp(72px,13vw,160px);
      line-height:.86;text-transform:uppercase;letter-spacing:.01em;
      max-width:8ch;
    }
    .hero-h1 em{color:var(--accent);font-style:normal;}
    .hero-sub-row{
      display:flex;align-items:flex-end;justify-content:space-between;
      gap:24px;margin-top:28px;flex-wrap:wrap;
    }
    .hero-stat{
      font-family:"Space Mono";font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);
    }
    .hero-stat strong{color:var(--muted);font-weight:400;display:block;font-size:24px;font-family:"Anton";letter-spacing:.04em;margin-bottom:2px;}
    .hero-stats{display:flex;gap:40px;}

    /* ══════════════════════════════════════
       BIO + SOCIALS SECTION
    ══════════════════════════════════════ */
    .bio-section{
      position:relative;z-index:2;
      padding:72px 0 64px;
      border-bottom:1px solid var(--line);
    }
    .bio-inner{
      display:grid;
      grid-template-columns:1.4fr 1fr;
      gap:80px;
      align-items:start;
    }

    .section-eyebrow{
      font-family:"Space Mono";font-size:10px;letter-spacing:.26em;text-transform:uppercase;
      color:var(--accent);margin-bottom:20px;
      display:flex;align-items:center;gap:10px;
    }
    .section-eyebrow .dot{width:5px;height:5px;border-radius:50%;background:var(--accent);}

    /* Bio text */
    .bio-text{
      font-size:17px;font-weight:400;line-height:1.8;
      color:rgba(245,241,230,.75);
    }
    .bio-text p+p{margin-top:1.1em;}

    /* Socials */
    .socials-col{}
    .social-links-list{display:flex;flex-direction:column;gap:4px;margin-top:0;}

    .social-link-row{
      display:flex;align-items:center;gap:14px;
      padding:14px 18px;border-radius:10px;
      border:1px solid transparent;
      color:var(--ink);
      transition:background .2s,border-color .2s;
    }
    .social-link-row:hover{
      background:var(--card);
      border-color:var(--card-line);
    }
    .soc-icon{
      width:36px;height:36px;border-radius:50%;
      background:var(--bg2);
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
      transition:background .2s;
    }
    .social-link-row:hover .soc-icon{background:rgba(255,59,46,.12);}
    .soc-icon svg{width:16px;height:16px;fill:var(--muted);transition:fill .2s;}
    .social-link-row:hover .soc-icon svg{fill:var(--accent);}
    .soc-info{flex:1;}
    .soc-platform{
      font-family:"Space Mono";font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);
    }
    .soc-handle{font-size:15px;font-weight:500;color:var(--ink);margin-top:2px;}
    .soc-follow{
      font-family:"Space Mono";font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
      color:var(--accent);padding:6px 14px;
      border:1px solid rgba(255,59,46,.35);border-radius:100px;
      transition:background .2s,border-color .2s;
      white-space:nowrap;
    }
    .social-link-row:hover .soc-follow{
      background:rgba(255,59,46,.12);border-color:var(--accent);
    }

    /* ══════════════════════════════════════
       MEMBERS SECTION
    ══════════════════════════════════════ */
    .members-section{
      position:relative;z-index:2;
      padding:72px 0 100px;
    }

    .members-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
      gap:2px;
      margin-top:40px;
    }

    /* ── Member card — mirrors .vcard style ── */
    .mcard{
      position:relative;
      aspect-ratio:3/4;
      overflow:hidden;
      background:var(--bg2);
      border:1px solid var(--card-line);
      cursor:pointer;
      transition:transform .28s var(--ease),border-color .28s,box-shadow .28s;
    }
    .mcard:hover{transform:scale(1.015);border-color:var(--accent);box-shadow:0 20px 50px rgba(0,0,0,.5);z-index:2;}

    .mcard-photo{
      position:absolute;inset:0;
      background-size:cover;background-position:center top;
      filter:brightness(.85) saturate(.9);
      transition:transform .5s var(--ease),filter .3s;
    }
    .mcard:hover .mcard-photo{transform:scale(1.05);filter:brightness(.55) saturate(.8);}

    .mcard-photo-placeholder{
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    }
    .mcard-photo-placeholder svg{width:72px;height:72px;opacity:.08;}

    /* gradient always on */
    .mcard-grad{
      position:absolute;inset:0;
      background:linear-gradient(to top,rgba(8,8,10,.96) 0%,rgba(8,8,10,.3) 45%,transparent 70%);
    }

    /* hover overlay play-ring style */
    .mcard-overlay{
      position:absolute;inset:0;
      display:flex;align-items:center;justify-content:center;
      opacity:0;transition:opacity .2s;
    }
    .mcard:hover .mcard-overlay{opacity:1;}
    .mcard-ring{
      width:70px;height:70px;border-radius:50%;
      border:2px solid white;
      display:flex;align-items:center;justify-content:center;
      background:rgba(255,255,255,.12);backdrop-filter:blur(4px);
      transition:background .2s,border-color .2s,transform .2s var(--ease);
    }
    .mcard:hover .mcard-ring{background:var(--accent);border-color:var(--accent);transform:scale(1.06);}
    .mcard-ring svg{width:22px;height:22px;fill:white;margin-left:2px;}

    .mcard-body{
      position:absolute;bottom:0;left:0;right:0;
      padding:22px 20px;
    }
    .mcard-role{
      font-family:"Space Mono";font-size:9px;letter-spacing:.24em;text-transform:uppercase;
      color:var(--accent);margin-bottom:6px;
    }
    .mcard-name{
      font-family:var(--font-display);font-size:clamp(22px,2.2vw,30px);
      text-transform:uppercase;line-height:.95;letter-spacing:.01em;
    }
    .mcard-cta{
      display:flex;align-items:center;gap:6px;
      font-family:"Space Mono";font-size:9px;letter-spacing:.18em;text-transform:uppercase;
      color:var(--muted);margin-top:10px;
      opacity:0;transform:translateY(6px);
      transition:opacity .25s,transform .25s var(--ease),color .2s;
    }
    .mcard:hover .mcard-cta{opacity:1;transform:translateY(0);color:var(--accent);}
    .mcard-cta svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;transition:transform .2s;}
    .mcard:hover .mcard-cta svg{transform:translateX(3px);}

    /* ── Skeletons ── */
    @keyframes shimmer{0%,100%{opacity:.3;}50%{opacity:.7;}}
    .sk{background:var(--card-line);border-radius:8px;animation:shimmer 1.6s ease-in-out infinite;}
    .sk-line{height:11px;border-radius:6px;}
    .sk-line.w60{width:60%;}.sk-line.w40{width:40%;}

    /* ══════════════════════════════════════
       MEMBER MODAL
    ══════════════════════════════════════ */
    .modal-backdrop{
      position:fixed;inset:0;z-index:9000;
      background:rgba(8,8,10,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
      display:flex;align-items:center;justify-content:center;
      padding:24px;
      opacity:0;pointer-events:none;transition:opacity .3s var(--ease);
    }
    .modal-backdrop.open{opacity:1;pointer-events:all;}

    .modal{
      position:relative;
      display:grid;grid-template-columns:400px 1fr;
      max-width:980px;width:100%;max-height:92vh;
      background:var(--bg2);
      border:1px solid var(--card-line);
      border-radius:4px;overflow:hidden;
      transform:translateY(20px) scale(.98);
      transition:transform .38s var(--ease);
    }
    .modal-backdrop.open .modal{transform:none;}

    /* Modal left: photo */
    .modal-left{position:relative;min-height:560px;background:var(--bg);}
    .modal-photo{
      position:absolute;inset:0;
      background-size:cover;background-position:center top;
    }
    .modal-photo-placeholder{
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    }
    .modal-photo-placeholder svg{width:90px;height:90px;opacity:.06;}
    .modal-photo-foot{
      position:absolute;bottom:0;left:0;right:0;padding:28px 24px;
      background:linear-gradient(to top,rgba(8,8,10,.97) 0%,transparent 100%);
    }
    .modal-member-role{
      font-family:"Space Mono";font-size:9px;letter-spacing:.26em;text-transform:uppercase;
      color:var(--accent);margin-bottom:5px;
    }
    .modal-member-name{
      font-family:var(--font-display);font-size:clamp(28px,3vw,40px);
      text-transform:uppercase;line-height:.92;
    }
    .modal-member-socials{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
    .modal-soc-btn{
      display:flex;align-items:center;gap:6px;
      padding:7px 13px;
      background:rgba(245,241,230,.06);border:1px solid var(--card-line);border-radius:100px;
      font-family:"Space Mono";font-size:10px;letter-spacing:.1em;text-transform:uppercase;
      color:var(--muted);
      transition:background .2s,border-color .2s,color .2s;
    }
    .modal-soc-btn:hover{background:rgba(255,59,46,.12);border-color:var(--accent);color:var(--accent);}
    .modal-soc-btn svg{width:13px;height:13px;fill:currentColor;flex-shrink:0;}

    /* Modal right: bio */
    .modal-right{
      padding:48px 44px;overflow-y:auto;
      display:flex;flex-direction:column;justify-content:center;
    }
    .modal-bio-eyebrow{
      font-family:"Space Mono";font-size:10px;letter-spacing:.26em;text-transform:uppercase;
      color:var(--accent);margin-bottom:18px;
    }
    .modal-bio-text{
      font-size:16px;font-weight:400;line-height:1.8;color:rgba(245,241,230,.72);
    }
    .modal-bio-text p+p{margin-top:.9em;}
    .modal-bio-placeholder{font-size:15px;font-style:italic;color:var(--faint);}

    .modal-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:28px;}
    .modal-tag{
      font-family:"Space Mono";font-size:9px;letter-spacing:.16em;text-transform:uppercase;
      color:var(--faint);padding:5px 11px;
      border:1px solid var(--card-line);border-radius:100px;
    }

    /* Close */
    .modal-close{
      position:absolute;top:16px;right:16px;z-index:10;
      width:36px;height:36px;border-radius:50%;
      background:rgba(8,8,10,.65);border:1px solid var(--card-line);
      display:flex;align-items:center;justify-content:center;cursor:pointer;
      transition:background .18s,border-color .18s;
    }
    .modal-close:hover{background:var(--accent);border-color:var(--accent);}
    .modal-close svg{width:15px;height:15px;stroke:var(--muted);fill:none;stroke-width:2.2;stroke-linecap:round;transition:stroke .18s;}
    .modal-close:hover svg{stroke:var(--accent-ink);}

    /* ── Footer — identical to videos.html ── */
    .foot{position:relative;z-index:2;padding:56px 0 36px;border-top:1px solid var(--line);}
    .foot-inner{display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;}
    .foot-wordmark{font-family:var(--font-display);font-size:22px;letter-spacing:.04em;}
    .foot-copy{font-family:"Space Mono";font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);}
    .foot-back{
      font-family:"Space Mono";font-size:11px;letter-spacing:.18em;text-transform:uppercase;
      color:var(--muted);border-bottom:1px solid var(--line);padding-bottom:1px;
      transition:color .2s,border-color .2s;
    }
    .foot-back:hover{color:var(--accent);border-color:var(--accent);}

    /* ── Reveal ── */
    .reveal{opacity:0;transform:translateY(22px);transition:opacity .65s var(--ease),transform .65s var(--ease);}
    .reveal.in{opacity:1;transform:none;}

    /* ── Responsive ── */
    @media(max-width:900px){
      .bio-inner{grid-template-columns:1fr;gap:48px;}
      .modal{grid-template-columns:1fr;}
      .modal-left{min-height:340px;}
      .modal-right{padding:32px 28px;}
      .members-grid{grid-template-columns:repeat(2,1fr);}
      .hero-stats{gap:24px;}
      .hero-sub-row{flex-direction:column;align-items:flex-start;gap:20px;}
    }
    @media(max-width:600px){
      .wrap{padding:0 18px;}
      .members-grid{grid-template-columns:repeat(2,1fr);}
      .modal{border-radius:0;}
      .modal-left{min-height:280px;}
      .modal-right{padding:24px 20px;}
      .hero-h1{font-size:clamp(64px,18vw,120px);}
    }
    @media(max-width:380px){
      .members-grid{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>

<div id="nav-mount"></div>

<div class="glow-field" aria-hidden="true">
  <div class="glow g1"></div>
  <div class="glow g2"></div>
</div>

<!-- ══════════════════════════════════════
     PAGE HERO
══════════════════════════════════════ -->
<div class="page-hero">
  <div class="hero-bg" id="hero-bg"></div>
  <div class="hero-grad"></div>
  <div class="hero-grad-left"></div>
  <div class="hero-content">
    <div class="wrap">
      <div class="hero-eyebrow"><span class="dot"></span> WD-HAN</div>
      <h1 class="hero-h1">The<br><em>Band</em></h1>
      <div class="hero-sub-row">
        <div class="hero-stats">
          <div class="hero-stat" id="stat-members"><strong>—</strong>Members</div>
          <div class="hero-stat" id="stat-releases"><strong>—</strong>Releases</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     BIO + SOCIALS
══════════════════════════════════════ -->
<section class="bio-section">
  <div class="wrap">
    <div class="bio-inner">

      <div>
        <div class="section-eyebrow"><span class="dot"></span> Our Story</div>
        <div class="bio-text" id="band-bio">
          <!-- Skeleton -->
          <div style="display:flex;flex-direction:column;gap:10px;" id="bio-skeleton">
            <div class="sk sk-line" style="width:92%"></div>
            <div class="sk sk-line" style="width:100%"></div>
            <div class="sk sk-line" style="width:78%"></div>
            <div class="sk sk-line" style="width:96%"></div>
            <div class="sk sk-line" style="width:65%"></div>
            <div class="sk sk-line" style="height:0;margin-top:6px"></div>
            <div class="sk sk-line" style="width:88%"></div>
            <div class="sk sk-line" style="width:100%"></div>
            <div class="sk sk-line" style="width:72%"></div>
          </div>
        </div>
      </div>

      <div>
        <div class="section-eyebrow"><span class="dot"></span> Follow Us</div>
        <div class="social-links-list" id="social-links-list">
          <!-- populated from Sanity siteSettings.socials -->
        </div>
      </div>

    </div>
  </div>
</section>

<!-- ══════════════════════════════════════
     MEMBERS GRID
══════════════════════════════════════ -->
<section class="members-section">
  <div class="wrap">
    <div class="section-eyebrow"><span class="dot"></span> The People</div>

    <div class="members-grid" id="members-grid">
      <!-- Skeleton cards -->
      <div class="mcard" style="pointer-events:none">
        <div class="mcard-photo" style="background:var(--bg2)"></div>
        <div class="mcard-grad"></div>
        <div class="mcard-body">
          <div class="sk sk-line w60" style="margin-bottom:8px"></div>
          <div class="sk sk-line w40" style="height:18px"></div>
        </div>
      </div>
      <div class="mcard" style="pointer-events:none">
        <div class="mcard-photo" style="background:var(--bg2)"></div>
        <div class="mcard-grad"></div>
        <div class="mcard-body">
          <div class="sk sk-line w60" style="margin-bottom:8px"></div>
          <div class="sk sk-line w40" style="height:18px"></div>
        </div>
      </div>
      <div class="mcard" style="pointer-events:none">
        <div class="mcard-photo" style="background:var(--bg2)"></div>
        <div class="mcard-grad"></div>
        <div class="mcard-body">
          <div class="sk sk-line w60" style="margin-bottom:8px"></div>
          <div class="sk sk-line w40" style="height:18px"></div>
        </div>
      </div>
      <div class="mcard" style="pointer-events:none">
        <div class="mcard-photo" style="background:var(--bg2)"></div>
        <div class="mcard-grad"></div>
        <div class="mcard-body">
          <div class="sk sk-line w60" style="margin-bottom:8px"></div>
          <div class="sk sk-line w40" style="height:18px"></div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- ── Footer ── -->
<footer class="foot">
  <div class="wrap">
    <div class="foot-inner">
      <div>
        <div class="foot-wordmark">WD-HAN</div>
        <div class="foot-copy" style="margin-top:6px;">© 2026 · All rights reserved</div>
      </div>
      <a href="/" class="foot-back">← Back to home</a>
    </div>
  </div>
</footer>

<!-- ══════════════════════════════════════
     MEMBER MODAL
══════════════════════════════════════ -->
<div class="modal-backdrop" id="member-modal" role="dialog" aria-modal="true" aria-label="Band member">
  <div class="modal">
    <button class="modal-close" id="modal-close-btn" aria-label="Close">
      <svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <div class="modal-left">
      <div class="modal-photo" id="modal-photo">
        <div class="modal-photo-placeholder">
          <svg viewBox="0 0 80 80" fill="none"><circle cx="40" cy="28" r="16" fill="white" opacity="0.15"/><path d="M8 72c0-17.673 14.327-32 32-32s32 14.327 32 32" fill="white" opacity="0.1"/></svg>
        </div>
      </div>
      <div class="modal-photo-foot">
        <p class="modal-member-role" id="modal-role"></p>
        <h2 class="modal-member-name" id="modal-name"></h2>
        <div class="modal-member-socials" id="modal-socials"></div>
      </div>
    </div>
    <div class="modal-right">
      <p class="modal-bio-eyebrow">About</p>
      <div class="modal-bio-text" id="modal-bio"></div>
      <div class="modal-tags" id="modal-tags"></div>
    </div>
  </div>
</div>


<!-- ── Scripts ── -->
<script>
  /* ══════════════════════════════════════
     SANITY CONFIG
  ══════════════════════════════════════ */
  const SANITY_PROJECT_ID = 'oz4mxjaz';
  const SANITY_DATASET    = 'production';

  function sanityUrl(q) {
    return `https://${SANITY_PROJECT_ID}.apicdn.sanity.io/v2021-10-21/data/query/${SANITY_DATASET}?query=${encodeURIComponent(q)}`;
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* Sanity image URL from asset reference */
  function sanityImgUrl(ref) {
    if (!ref) return null;
    // ref: image-abc123def-800x600-jpg
    const clean = ref.replace('image-', '');
    const parts = clean.split('-');
    const ext   = parts.pop();
    const id    = parts.join('-');
    return `https://cdn.sanity.io/images/${SANITY_PROJECT_ID}/${SANITY_DATASET}/${id}.${ext}`;
  }

  /* Sanity portable text → HTML */
  function renderBlocks(blocks) {
    if (!Array.isArray(blocks)) return '';
    return blocks.map(b => {
      if (b._type !== 'block') return '';
      const text = (b.children || []).map(c => {
        let t = esc(c.text || '');
        if (c.marks?.includes('strong')) t = `<strong>${t}</strong>`;
        if (c.marks?.includes('em'))     t = `<em>${t}</em>`;
        return t;
      }).join('');
      return text ? `<p>${text}</p>` : '';
    }).filter(Boolean).join('');
  }

  /* ══════════════════════════════════════
     SOCIAL META
  ══════════════════════════════════════ */
  const SOCIAL_META = {
    instagram:  { label: 'Instagram',   handle: '@wdhanband', icon: `<svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>` },
    youtube:    { label: 'YouTube',     handle: '@wdhanband', icon: `<svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>` },
    tiktok:     { label: 'TikTok',      handle: '@wdhanband', icon: `<svg viewBox="0 0 24 24"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/></svg>` },
    spotify:    { label: 'Spotify',     handle: 'WD-HAN',     icon: `<svg viewBox="0 0 24 24"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>` },
    facebook:   { label: 'Facebook',    handle: 'WD-HAN',     icon: `<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>` },
    appleMusic: { label: 'Apple Music', handle: 'WD-HAN', icon: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>` },
  const SOCIAL_ORDER = ['spotify','appleMusic','instagram','youtube','tiktok','facebook'];

  /* ══════════════════════════════════════
     SCROLL REVEAL
  ══════════════════════════════════════ */
  const revIO = new IntersectionObserver(entries =>
    entries.forEach(en => { if (en.isIntersecting) { en.target.classList.add('in'); revIO.unobserve(en.target); } }),
    { threshold: 0.07 }
  );
  function observe() { document.querySelectorAll('.reveal:not(.in)').forEach(el => revIO.observe(el)); }
  setTimeout(observe, 80);

  /* ══════════════════════════════════════
     MAIN DATA FETCH
  ══════════════════════════════════════ */
  (async function() {
    try {
      // Parallel fetch: siteSettings + members + release count
      const [settingsRes, membersRes, releasesRes] = await Promise.all([
        fetch(sanityUrl(`*[_type == "siteSettings"][0]{
          bio,
          bioLong,
          "galleryBg": *[_type == "galleryImage" && homepageBackground == true][0]{ "url": image.asset->url, "ref": image.asset._ref },
          socials
        }`)),
        fetch(sanityUrl(`*[_type == "member"] | order(order asc, _createdAt asc) {
          _id, name, role, bio, instruments,
          "photoUrl": photo.asset->url,
          "photoRef": photo.asset._ref,
          socialLinks
        }`)),
        fetch(sanityUrl(`count(*[_type == "release"])`))
      ]);

      const { result: settings } = await settingsRes.json();
      const { result: members  } = await membersRes.json();
      const { result: relCount } = await releasesRes.json();

      // ── Hero background ──────────────────────────────────────────
      const heroBg = document.getElementById('hero-bg');
      // Use a gallery homepage image if available
      let bgUrl = settings?.galleryBg?.url;
      // Fallback: first member photo
      if (!bgUrl && members?.length) bgUrl = members[0].photoUrl;
      if (bgUrl) heroBg.style.backgroundImage = `url('${bgUrl}')`;

      // ── Stats ────────────────────────────────────────────────────
      document.getElementById('stat-members').innerHTML  = `<strong>${members?.length || '—'}</strong>Members`;
      document.getElementById('stat-releases').innerHTML = `<strong>${relCount || '—'}</strong>Releases`;

      // ── Band bio ─────────────────────────────────────────────────
      renderBio(settings);

      // ── Social links ─────────────────────────────────────────────
      renderSocials(settings?.socials || {});

      // ── Members grid ─────────────────────────────────────────────
      renderMembers(members || []);

    } catch (err) {
      console.warn('Sanity fetch failed:', err);
      renderBioFallback();
      renderSocials({});
      renderMembersFallback();
    }
  })();

  /* ── Bio ── */
  function renderBio(settings) {
    const el = document.getElementById('band-bio');
    let html = '';
    if (settings?.bioLong && Array.isArray(settings.bioLong)) {
      html = renderBlocks(settings.bioLong);
    } else if (settings?.bio) {
      html = settings.bio.split(/\n\n+/).map(p => `<p>${esc(p)}</p>`).join('');
    }
    el.innerHTML = html || `<p style="color:var(--faint);font-style:italic">Add your band bio in Sanity Studio → Site Settings → Band Bio (Full).</p>`;
  }
  function renderBioFallback() {
    document.getElementById('band-bio').innerHTML = `<p style="color:var(--faint);font-style:italic">Band bio coming soon.</p>`;
  }

  /* ── Socials ── */
  function renderSocials(socials) {
    const el = document.getElementById('social-links-list');
    const rows = SOCIAL_ORDER
      .filter(k => socials[k])
      .map(k => {
        const m = SOCIAL_META[k];
        return `<a href="${esc(socials[k])}" target="_blank" rel="noopener" class="social-link-row">
          <div class="soc-icon">${m.icon}</div>
          <div class="soc-info">
            <div class="soc-platform">${m.label}</div>
            <div class="soc-handle">${m.handle}</div>
          </div>
          <span class="soc-follow">Follow</span>
        </a>`;
      });
    el.innerHTML = rows.length
      ? rows.join('')
      : `<p style="color:var(--faint);font-size:14px;font-style:italic">Populate socials in Sanity Studio → Site Settings → Socials.</p>`;
  }

  /* ── Members grid ── */
  function renderMembers(members) {
    const grid = document.getElementById('members-grid');
    if (!members.length) { renderMembersFallback(); return; }

    grid.innerHTML = members.map((m, i) => {
      const delay     = (i * 0.06).toFixed(2) + 's';
      const photoStyle = m.photoUrl ? `background-image:url('${m.photoUrl}')` : '';
      return `
        <div class="mcard reveal" style="animation-delay:${delay}"
             data-id="${esc(m._id)}" role="button" tabindex="0" aria-label="View ${esc(m.name)}'s profile">
          <div class="mcard-photo" style="${photoStyle}">
            ${!m.photoUrl ? `<div class="mcard-photo-placeholder">
              <svg viewBox="0 0 80 80" fill="none"><circle cx="40" cy="28" r="16" fill="white" opacity="0.12"/><path d="M8 72c0-17.673 14.327-32 32-32s32 14.327 32 32" fill="white" opacity="0.08"/></svg>
            </div>` : ''}
          </div>
          <div class="mcard-grad"></div>
          <div class="mcard-overlay">
            <div class="mcard-ring">
              <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z" fill="white" opacity="0"/><circle cx="12" cy="12" r="10" fill="none" stroke="white" stroke-width="0"/></svg>
              <!-- person icon -->
              <svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:white"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v2h20v-2c0-3.3-6.7-5-10-5z"/></svg>
            </div>
          </div>
          <div class="mcard-body">
            <p class="mcard-role">${esc(m.role || '')}</p>
            <h3 class="mcard-name">${esc(m.name || '')}</h3>
            <div class="mcard-cta">
              Read more
              <svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </div>
          </div>
        </div>
      `;
    }).join('');

    // Store member data for modal
    window._members = members;
    observe();

    // Click / keyboard handlers
    grid.querySelectorAll('.mcard').forEach(card => {
      const handler = () => {
        const m = window._members.find(x => x._id === card.dataset.id);
        if (m) openModal(m);
      };
      card.addEventListener('click', handler);
      card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handler(); } });
    });
  }

  function renderMembersFallback() {
    document.getElementById('members-grid').innerHTML = `
      <div style="grid-column:1/-1;padding:60px 0;text-align:center;
                  font-family:'Space Mono';font-size:11px;letter-spacing:.2em;
                  text-transform:uppercase;color:var(--faint)">
        No members yet — add them in Sanity Studio as Member documents.
      </div>`;
  }

  /* ══════════════════════════════════════
     MODAL
  ══════════════════════════════════════ */
  const modal    = document.getElementById('member-modal');
  const closeBtn = document.getElementById('modal-close-btn');

  function openModal(m) {
    // Photo
    const photoEl = document.getElementById('modal-photo');
    if (m.photoUrl) {
      photoEl.style.backgroundImage = `url('${m.photoUrl}')`;
    } else {
      photoEl.style.backgroundImage = '';
    }

    // Name + role
    document.getElementById('modal-name').textContent = m.name || '';
    document.getElementById('modal-role').textContent = m.role || '';

    // Member socials
    const socEl = document.getElementById('modal-socials');
    const memberSocials = m.socialLinks || {};
    const socBtns = ['instagram','tiktok','youtube','spotify','facebook']
      .filter(k => memberSocials[k])
      .map(k => {
        const meta = SOCIAL_META[k] || { label: k, icon: '' };
        return `<a href="${esc(memberSocials[k])}" target="_blank" rel="noopener" class="modal-soc-btn">
          ${meta.icon}${meta.label}
        </a>`;
      });
    socEl.innerHTML = socBtns.join('');

    // Bio
    const bioEl = document.getElementById('modal-bio');
    if (m.bio) {
      bioEl.innerHTML = Array.isArray(m.bio)
        ? renderBlocks(m.bio)
        : m.bio.split(/\n\n+/).map(p => `<p>${esc(p)}</p>`).join('');
    } else {
      bioEl.innerHTML = `<p class="modal-bio-placeholder">Full bio coming soon — add it in Sanity Studio.</p>`;
    }

    // Tags
    const tagsEl = document.getElementById('modal-tags');
    tagsEl.innerHTML = (m.instruments || []).map(t => `<span class="modal-tag">${esc(t)}</span>`).join('');

    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
    closeBtn.focus();
  }

  function closeModal() {
    modal.classList.remove('open');
    document.body.style.overflow = '';
  }

  closeBtn.addEventListener('click', closeModal);
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
