<!DOCTYPE html>
<html lang="en" data-theme="midnight">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg" />
  <link rel="apple-touch-icon" href="/assets/img/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music — WD-HAN</title>
  <meta name="description" content="The complete WD-HAN discography. Singles, EPs, and albums — stream and buy." />

  <link rel="stylesheet" href="/assets/css/nav.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    @font-face {
      font-family: 'Splatink';
      src: url('/assets/fonts/Splatink.otf') format('opentype');
      font-display: swap;
    }

    /* ── Tokens ── */
    :root {
      --accent:      #ff3b2e;
      --accent-ink:  #0a0a0a;
      --maxw:        1240px;
      --ease:        cubic-bezier(.22,.61,.36,1);
      --font-display:'Splatink', "Anton", sans-serif;
      --bg:          #08080a;
      --bg2:         #101014;
      --ink:         #f5f1e6;
      --muted:       rgba(245,241,230,.55);
      --faint:       rgba(245,241,230,.32);
      --line:        rgba(245,241,230,.14);
      --card:        rgba(245,241,230,.045);
      --card-line:   rgba(245,241,230,.10);
      --blob-blend:  screen;
      --blob-op:     .38;
    }

    /* ── Reset ── */
    *{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{
      background:var(--bg);color:var(--ink);
      font-family:"Space Grotesk",system-ui,sans-serif;
      -webkit-font-smoothing:antialiased;
      overflow-x:hidden;
    }
    img{display:block;max-width:100%;}
    a{color:inherit;text-decoration:none;}
    button{font-family:inherit;cursor:pointer;}
    ::selection{background:var(--accent);color:var(--accent-ink);}
    .wrap{max-width:var(--maxw);margin:0 auto;padding:0 28px;}

    /* ── Glow field ── */
    .glow-field{
      position:fixed;inset:0;z-index:0;pointer-events:none;
      opacity:var(--blob-op);mix-blend-mode:var(--blob-blend);contain:strict;
    }
    .glow{
      position:absolute;border-radius:50%;
      background:radial-gradient(circle at 50% 50%,var(--accent) 0%,color-mix(in srgb,var(--accent) 55%,transparent) 36%,transparent 68%);
    }
    @keyframes drift1{0%,100%{transform:translate(0,0);}50%{transform:translate(60px,40px);}}
    @keyframes drift2{0%,100%{transform:translate(0,0);}50%{transform:translate(-80px,-50px);}}
    .b1{animation:drift1 18s ease-in-out infinite;width:500px;height:500px;top:-10%;left:-8%;}
    .b2{animation:drift2 22s ease-in-out infinite;width:360px;height:360px;top:50%;left:72%;}
    @media(prefers-reduced-motion:reduce){.glow{animation:none!important;}}

    /* ══════════════════════════════════════
       PAGE HERO
    ══════════════════════════════════════ */
    .page-hero{
      position:relative;z-index:2;
      min-height:60vh;display:flex;align-items:flex-end;
      padding:0;overflow:hidden;
      border-bottom:1px solid var(--line);
    }
    .hero-bg{
      position:absolute;inset:0;z-index:0;
      background-size:cover;background-position:center;
      filter:brightness(.35) saturate(.8);
      transition:background-image .5s;
    }
    .hero-bg::after{
      content:"";position:absolute;inset:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity:.5;pointer-events:none;
    }
    .hero-grad{
      position:absolute;inset:0;z-index:1;
      background:linear-gradient(to top,var(--bg) 0%,rgba(8,8,10,.6) 40%,rgba(8,8,10,.15) 70%,transparent 100%);
    }
    .hero-grad-left{
      position:absolute;inset:0;z-index:1;
      background:linear-gradient(to right,rgba(8,8,10,.7) 0%,transparent 60%);
    }
    .hero-content{
      position:relative;z-index:3;
      width:100%;padding:130px 0 56px;
    }
    .hero-content .wrap{display:flex;flex-direction:column;gap:0;}
    .hero-eyebrow{
      font-family:"Space Mono";font-size:10px;letter-spacing:.36em;text-transform:uppercase;
      color:var(--accent);margin-bottom:16px;
      display:flex;align-items:center;gap:10px;
    }
    .hero-eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);}
    .hero-h1{
      font-family:var(--font-display);
      font-size:clamp(72px,13vw,160px);
      line-height:.86;text-transform:uppercase;letter-spacing:.01em;
      max-width:8ch;
    }
    .hero-h1 em{color:var(--accent);font-style:normal;}
    .hero-sub-row{
      display:flex;align-items:flex-end;justify-content:space-between;
      gap:24px;margin-top:28px;flex-wrap:wrap;
    }
    .hero-stat{
      font-family:"Space Mono";font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);
    }
    .hero-stat strong{color:var(--muted);font-weight:400;display:block;font-size:24px;font-family:"Anton";letter-spacing:.04em;margin-bottom:2px;}
    .hero-stats{display:flex;gap:40px;}

    /* ══════════════════════════════════════
       FILTER BAR + SEARCH
    ══════════════════════════════════════ */
    .filter-bar{
      position:sticky;top:80px;z-index:30;
      background:color-mix(in srgb,var(--bg) 88%,transparent);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--line);
      padding:0;
    }
    .filter-bar-inner{
      display:flex;align-items:center;gap:12px;
      padding:12px 0;
    }
    .filter-inner{
      display:flex;align-items:center;gap:6px;
      flex:1;min-width:0;
      overflow-x:auto;
      scrollbar-width:none;-ms-overflow-style:none;
    }
    .filter-inner::-webkit-scrollbar{display:none;}
    .filter-pill{
      flex-shrink:0;
      font-family:"Space Mono";font-size:11px;letter-spacing:.18em;text-transform:uppercase;
      padding:8px 18px;border-radius:100px;border:1px solid var(--card-line);
      background:transparent;color:var(--muted);
      transition:all .18s var(--ease);white-space:nowrap;cursor:pointer;
    }
    .filter-pill:hover{border-color:var(--ink);color:var(--ink);}
    .filter-pill.active{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);}

    /* Search */
    .search-wrap{position:relative;flex-shrink:0;}
    .search-wrap svg{
      position:absolute;left:14px;top:50%;transform:translateY(-50%);
      width:14px;height:14px;color:var(--faint);pointer-events:none;
      stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;
    }
    .search-input{
      background:var(--card);border:1px solid var(--card-line);color:var(--ink);
      padding:8px 16px 8px 36px;border-radius:100px;
      font-family:"Space Mono";font-size:11px;letter-spacing:.1em;
      outline:none;width:200px;
      transition:border-color .2s,width .3s var(--ease),background .2s;
    }
    .search-input::placeholder{color:var(--faint);}
    .search-input:focus{border-color:var(--accent);background:color-mix(in srgb,var(--card) 80%,transparent);width:260px;}
    .search-input.has-value{border-color:var(--muted);}
    .search-clear{
      position:absolute;right:12px;top:50%;transform:translateY(-50%);
      background:none;border:none;color:var(--faint);cursor:pointer;
      display:none;align-items:center;justify-content:center;padding:2px;transition:color .18s;
    }
    .search-clear:hover{color:var(--accent);}
    .search-clear svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;}
    .search-wrap.active .search-clear{display:flex;}

    /* ══════════════════════════════════════
       MUSIC CONTENT AREA
    ══════════════════════════════════════ */
    .music-main{position:relative;z-index:2;padding:64px 0 80px;}

    /* ── Section chrome ── */
    .music-section{margin-bottom:64px;}
    .music-section + .music-section{border-top:1px solid var(--line);padding-top:64px;}
    .section-label{display:flex;align-items:baseline;gap:18px;margin-bottom:40px;}
    .section-label h2{
      font-family:var(--font-display);
      font-size:clamp(32px,4.5vw,60px);
      line-height:.92;text-transform:uppercase;
    }
    .section-label .count{
      font-family:"Space Mono";font-size:13px;letter-spacing:.22em;text-transform:uppercase;
      color:var(--faint);margin-top:4px;
    }

    /* ── Skeleton loader ── */
    @keyframes shimmer{0%,100%{opacity:.3;}50%{opacity:.7;}}
    .sk{background:var(--card-line);border-radius:8px;animation:shimmer 1.6s ease-in-out infinite;}

    /* ══════════════════════════════════════
       LATEST RELEASE — full-width feature card
    ══════════════════════════════════════ */
    .feature-section{margin-bottom:64px;}
    .feature-label{display:flex;align-items:baseline;gap:18px;margin-bottom:28px;}
    .feature-label h2{
      font-family:var(--font-display);
      font-size:clamp(32px,4.5vw,60px);
      line-height:.92;text-transform:uppercase;
    }

    .feature-card{
      display:grid;
      grid-template-columns:340px 1fr;
      border:1px solid var(--card-line);border-radius:20px;overflow:hidden;
      background:var(--card);
      transition:border-color .25s,box-shadow .25s;
      min-height:280px;
    }
    .feature-card:hover{
      border-color:var(--accent);
      box-shadow:0 24px 60px rgba(0,0,0,.45);
    }
    .feature-art{
      position:relative;overflow:hidden;display:block;flex-shrink:0;
    }
    .feature-art img{
      width:100%;height:100%;object-fit:cover;
      transition:transform .5s var(--ease);
      display:block;
    }
    .feature-card:hover .feature-art img{transform:scale(1.04);}
    .feature-art-ph{
      width:100%;height:100%;min-height:280px;
      background:
        repeating-linear-gradient(45deg,color-mix(in srgb,var(--ink) 7%,transparent) 0 2px,transparent 2px 12px),
        color-mix(in srgb,var(--ink) 5%,transparent);
      display:flex;align-items:center;justify-content:center;
    }
    .feature-type-badge{
      position:absolute;top:14px;left:14px;
      font-family:"Space Mono";font-size:9px;letter-spacing:.2em;text-transform:uppercase;
      background:rgba(8,8,10,.75);backdrop-filter:blur(6px);
      color:var(--ink);padding:5px 10px;border-radius:100px;border:1px solid var(--line);
    }
    .feature-new-badge{
      position:absolute;top:14px;right:14px;
      font-family:"Space Mono";font-size:9px;letter-spacing:.2em;text-transform:uppercase;
      background:var(--accent);color:var(--accent-ink);
      padding:5px 10px;border-radius:100px;
    }
    .feature-body{
      padding:36px 40px;
      display:flex;flex-direction:column;justify-content:center;gap:0;
    }
    .feature-eyebrow{
      font-family:"Space Mono";font-size:10px;letter-spacing:.28em;text-transform:uppercase;
      color:var(--accent);margin-bottom:14px;
    }
    .feature-title{
      font-family:var(--font-display);
      font-size:clamp(36px,5vw,72px);
      line-height:.9;text-transform:uppercase;letter-spacing:.01em;
      color:var(--ink);transition:color .18s;
      display:block;margin-bottom:16px;
    }
    .feature-title:hover{color:var(--accent);}
    .feature-meta{
      font-family:"Space Mono";font-size:11px;letter-spacing:.14em;text-transform:uppercase;
      color:var(--faint);margin-bottom:28px;
    }
    .feature-links{display:flex;gap:10px;flex-wrap:wrap;}

    /* skeleton for feature card */
    .sk-feature-card{
      display:grid;grid-template-columns:340px 1fr;
      border:1px solid var(--card-line);border-radius:20px;overflow:hidden;
      background:var(--card);min-height:280px;
    }
    .sk-feature-art{min-height:280px;}
    .sk-feature-body{padding:36px 40px;display:flex;flex-direction:column;gap:14px;justify-content:center;}
    .sk-feature-title{height:52px;border-radius:8px;width:70%;}
    .sk-feature-sub{height:14px;border-radius:6px;width:40%;}
    .sk-feature-links{display:flex;gap:10px;}

    /* ══════════════════════════════════════
       SINGLES — 4-column card grid
    ══════════════════════════════════════ */
    .singles-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:20px;
    }

    /* ═══ ALBUMS & EPs — card grid ═══ */
    .albums-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
      gap:24px;
    }
    .album-card{
      border:1px solid var(--card-line);border-radius:18px;overflow:hidden;
      background:var(--card);display:flex;flex-direction:column;
      transition:transform .25s var(--ease),border-color .25s,box-shadow .25s;
    }
    .album-card:hover{
      transform:translateY(-5px);border-color:var(--accent);
      box-shadow:0 20px 50px rgba(0,0,0,.4);
    }
    /* singles-grid cards are slightly more compact */
    .singles-grid .album-card{border-radius:14px;}
    .singles-grid .album-body{padding:14px 16px;}
    .singles-grid .album-title{font-size:16px;}
    .singles-grid .album-sub{margin-bottom:12px;}
    .singles-grid .album-links{padding:0 16px 14px;}
    .singles-grid .album-links .slink{padding:6px 10px;font-size:9px;}

    .album-art{position:relative;aspect-ratio:1;overflow:hidden;display:block;}
    .album-art img{
      width:100%;height:100%;object-fit:cover;
      transition:transform .5s var(--ease);display:block;
    }
    .album-card:hover .album-art img{transform:scale(1.04);}
    .album-art-ph{
      width:100%;height:100%;
      background:
        repeating-linear-gradient(45deg,color-mix(in srgb,var(--ink) 7%,transparent) 0 2px,transparent 2px 12px),
        color-mix(in srgb,var(--ink) 5%,transparent);
      display:flex;align-items:center;justify-content:center;
    }
    .album-art-ph span{
      font-family:"Space Mono";font-size:10px;letter-spacing:.2em;text-transform:uppercase;
      color:var(--faint);text-align:center;padding:0 16px;
    }
    .album-type-badge{
      position:absolute;top:12px;left:12px;
      font-family:"Space Mono";font-size:9px;letter-spacing:.2em;text-transform:uppercase;
      background:rgba(8,8,10,.75);backdrop-filter:blur(6px);
      color:var(--ink);padding:5px 10px;border-radius:100px;border:1px solid var(--line);
    }
    .album-play-btn{
      position:absolute;bottom:12px;right:12px;
      width:46px;height:46px;border-radius:50%;
      background:var(--accent);color:var(--accent-ink);border:none;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 16px rgba(0,0,0,.4);
      opacity:0;transform:translateY(6px);
      transition:opacity .2s var(--ease),transform .2s var(--ease);cursor:pointer;
    }
    .album-card:hover .album-play-btn{opacity:1;transform:none;}
    .album-play-btn.active{opacity:1;transform:none;background:white;color:#000;}
    .album-play-btn svg{width:18px;height:18px;}
    .singles-grid .album-play-btn{width:36px;height:36px;}
    .singles-grid .album-play-btn svg{width:14px;height:14px;}
    .album-body{padding:20px 22px;}
    .album-title{
      font-weight:700;font-size:19px;line-height:1.2;margin-bottom:4px;
      color:var(--ink);transition:color .18s;display:block;
    }
    .album-title:hover{color:var(--accent);}
    .album-sub{
      font-family:"Space Mono";font-size:11px;letter-spacing:.12em;text-transform:uppercase;
      color:var(--faint);margin-bottom:16px;
    }
    .album-embed{
      overflow:hidden;max-height:0;transition:max-height .45s var(--ease);margin:0 22px;
    }
    .album-embed.open{max-height:160px;}
    .album-embed iframe{
      width:100%;height:152px;border:none;border-radius:10px;margin-bottom:14px;display:block;
    }
    .album-links{display:flex;gap:8px;flex-wrap:wrap;padding:0 22px 20px;}

    /* ── Streaming link pills ── */
    .slink{
      display:flex;align-items:center;gap:6px;
      padding:7px 13px;border-radius:100px;
      border:1px solid var(--card-line);
      font-family:"Space Mono";font-size:10px;letter-spacing:.12em;text-transform:uppercase;
      color:var(--muted);transition:all .18s var(--ease);white-space:nowrap;
    }
    .slink svg{width:14px;height:14px;flex-shrink:0;}
    .slink:hover{border-color:var(--accent);color:var(--accent);}
    .slink.primary{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);}
    .slink.primary:hover{background:color-mix(in srgb,var(--accent) 85%,white);transform:scale(1.03);}

    /* ── Skeleton cards ── */
    .sk-album-card{border:1px solid var(--card-line);border-radius:18px;overflow:hidden;background:var(--card);}
    .sk-album-art{aspect-ratio:1;}
    .sk-album-body{padding:20px 22px;display:flex;flex-direction:column;gap:10px;}
    .sk-line{height:13px;border-radius:6px;}
    .sk-line.w80{width:80%;}
    .sk-line.w50{width:50%;}

    /* ── Empty / no results ── */
    .empty{
      text-align:center;padding:60px 24px;
      font-family:"Space Mono";font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);
    }
    .no-results{
      text-align:center;padding:60px 24px;
      font-family:"Space Mono";font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--faint);
    }

    /* ── Footer ── */
    .foot{
      position:relative;z-index:2;padding:56px 0 36px;
      border-top:1px solid var(--line);
    }
    .foot-inner{display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;}
    .foot-wordmark{font-family:var(--font-display);font-size:22px;letter-spacing:.04em;}
    .foot-copy{font-family:"Space Mono";font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);}
    .foot-back{
      font-family:"Space Mono";font-size:11px;letter-spacing:.18em;text-transform:uppercase;
      color:var(--muted);border-bottom:1px solid var(--line);padding-bottom:1px;
      transition:color .2s,border-color .2s;
    }
    .foot-back:hover{color:var(--accent);border-color:var(--accent);}

    /* ── Responsive ── */
    @media(max-width:1100px){
      .singles-grid{grid-template-columns:repeat(3,1fr);}
      .feature-card{grid-template-columns:280px 1fr;}
      .sk-feature-card{grid-template-columns:280px 1fr;}
    }
    @media(max-width:900px){
      .singles-grid{grid-template-columns:repeat(3,1fr);}
      .feature-card{grid-template-columns:1fr;grid-template-rows:auto 1fr;}
      .sk-feature-card{grid-template-columns:1fr;}
      .feature-art{min-height:260px;}
      .sk-feature-art{min-height:200px;}
      .feature-body{padding:28px 28px;}
      .hero-stats{gap:24px;}
      .search-input{width:160px;}
      .search-input:focus{width:200px;}
      .hero-sub-row{flex-direction:column;align-items:flex-start;gap:20px;}
    }
    @media(max-width:640px){
      .wrap{padding:0 18px;}
      .singles-grid{grid-template-columns:repeat(2,1fr);gap:14px;}
      .albums-grid{grid-template-columns:1fr 1fr;}
      .filter-bar-inner{flex-wrap:wrap;gap:8px;}
      .search-wrap{width:100%;}
      .search-input{width:100%;}
      .search-input:focus{width:100%;}
      .feature-body{padding:20px 20px 24px;}
      .feature-title{font-size:clamp(28px,8vw,52px);}
    }
    @media(max-width:420px){
      .singles-grid{grid-template-columns:repeat(2,1fr);}
      .albums-grid{grid-template-columns:1fr;}
    }

    /* ── Reveal ── */
    .reveal{opacity:0;transform:translateY(20px);transition:opacity .6s var(--ease),transform .6s var(--ease);}
    .reveal.in{opacity:1;transform:none;}
  </style>
</head>
<body>

<div id="nav-mount"></div>

<div class="glow-field" aria-hidden="true">
  <div class="glow b1"></div>
  <div class="glow b2"></div>
</div>

<!-- ══════════════════════════════════════
     PAGE HERO
══════════════════════════════════════ -->
<div class="page-hero" id="page-hero">
  <div class="hero-bg" id="hero-bg"></div>
  <div class="hero-grad"></div>
  <div class="hero-grad-left"></div>
  <div class="hero-content">
    <div class="wrap">
      <div class="hero-eyebrow"><span class="dot"></span> WD-HAN</div>
      <h1 class="hero-h1">All the<br><em>music</em></h1>
      <div class="hero-sub-row">
        <div class="hero-stats">
          <div class="hero-stat" id="stat-releases"><strong>—</strong>Releases</div>
          <div class="hero-stat" id="stat-tracks"><strong>—</strong>Tracks</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     FILTER BAR + SEARCH
══════════════════════════════════════ -->
<div class="filter-bar">
  <div class="wrap">
    <div class="filter-bar-inner">
      <div class="filter-inner" id="filter-inner">
        <button class="filter-pill active" data-type="all">All</button>
        <button class="filter-pill" data-type="single">Singles</button>
        <button class="filter-pill" data-type="ep">EPs</button>

<script>
  /* ── Sanity config ── */
  const SANITY_PROJECT_ID = 'oz4mxjaz';
  const SANITY_DATASET    = 'production';

  function sanityUrl(q) {
    return `https://${SANITY_PROJECT_ID}.apicdn.sanity.io/v2021-10-21/data/query/${SANITY_DATASET}?query=${encodeURIComponent(q)}`;
  }
  function sanityImg(url, w) {
    return url ? `${url}?w=${w}&auto=format&fit=crop` : null;
  }
  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function spotifyEmbed(url) {
    if (!url) return null;
    const m = url.match(/spotify\.com\/(track|album|playlist)\/([A-Za-z0-9]+)/);
    return m ? { type: m[1], id: m[2] } : null;
  }
  function embedSrc(url) {
    const s = spotifyEmbed(url);
    return s ? `https://open.spotify.com/embed/${s.type}/${s.id}?utm_source=generator&theme=0` : null;
  }

  /* ── Scroll reveal ── */
  const revealIO = new IntersectionObserver(entries => {
    entries.forEach(en => {
      if (en.isIntersecting) { en.target.classList.add('in'); revealIO.unobserve(en.target); }
    });
  }, { threshold: 0.08 });
  function observe() { document.querySelectorAll('.reveal:not(.in)').forEach(el => revealIO.observe(el)); }
  setTimeout(observe, 80);

  /* ── Streaming link icons ── */
  const ICONS = {
    spotify:     `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.5 17.3a.75.75 0 0 1-1.03.25c-2.82-1.72-6.37-2.11-10.55-1.16a.75.75 0 1 1-.33-1.46c4.58-1.04 8.5-.6 11.66 1.34.36.22.47.69.25 1.03zm1.47-3.27a.94.94 0 0 1-1.29.31c-3.23-1.99-8.16-2.56-11.98-1.4a.94.94 0 1 1-.55-1.8c4.37-1.32 9.8-.68 13.5 1.6.44.27.58.85.32 1.29zm.13-3.4C15.73 8.26 8.5 8.02 4.78 9.15a1.12 1.12 0 1 1-.65-2.15c4.28-1.3 12.26-1.05 16.55 1.5a1.12 1.12 0 1 1-1.15 1.93z"/></svg>`,
    appleMusic:  `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.36 12.6c-.02-2.3 1.88-3.4 1.96-3.46-1.07-1.56-2.73-1.78-3.32-1.8-1.41-.14-2.76.83-3.47.83-.72 0-1.82-.81-3-.79-1.54.02-2.96.9-3.75 2.27-1.6 2.78-.41 6.9 1.15 9.16.76 1.1 1.67 2.34 2.86 2.3 1.15-.05 1.58-.74 2.97-.74 1.38 0 1.77.74 2.98.72 1.23-.02 2.01-1.12 2.76-2.23.87-1.28 1.23-2.52 1.25-2.58-.03-.01-2.4-.92-2.42-3.65zM14.13 5.6c.63-.77 1.06-1.83.94-2.9-.91.04-2.02.61-2.67 1.37-.58.68-1.09 1.76-.95 2.8 1.02.08 2.05-.51 2.68-1.27z"/></svg>`,
    youtube:     `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2a3.02 3.02 0 0 0-2.12-2.14C19.5 3.55 12 3.55 12 3.55s-7.5 0-9.38.51A3.02 3.02 0 0 0 .5 6.2C0 8.08 0 12 0 12s0 3.92.5 5.8a3.02 3.02 0 0 0 2.12 2.14c1.88.51 9.38.51 9.38.51s7.5 0 9.38-.51a3.02 3.02 0 0 0 2.12-2.14C24 15.92 24 12 24 12s0-3.92-.5-5.8zM9.6 15.6V8.4l6.2 3.6-6.2 3.6z"/></svg>`,
    tidal:       `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.5L12 9.5L16 5.5L20 9.5L16 13.5L12 9.5L8 13.5L4 9.5L8 5.5ZM12 11.5L8 15.5L12 19.5L16 15.5L12 11.5Z"/></svg>`,
    amazonMusic: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M13.958 10.09c0 1.232.029 2.256-.591 3.351-.502.891-1.301 1.438-2.186 1.438-1.214 0-1.922-.924-1.922-2.292 0-2.692 2.415-3.182 4.7-3.182v.685zm3.186 7.705c-.209.189-.512.201-.749.075-1.052-.873-1.24-1.279-1.814-2.112-1.732 1.767-2.961 2.295-5.209 2.295-2.66 0-4.731-1.641-4.731-4.925 0-2.565 1.391-4.309 3.37-5.164 1.716-.75 4.112-.884 5.942-1.087v-.405c0-.748.058-1.631-.381-2.278-.381-.579-1.11-.819-1.75-.819-1.19 0-2.251.609-2.511 1.871-.053.282-.261.561-.543.575l-3.045-.328c-.256-.058-.539-.266-.466-.66.701-3.698 4.042-4.812 7.031-4.812 1.529 0 3.527.407 4.733 1.568 1.529 1.43 1.383 3.34 1.383 5.42v4.909c0 1.476.612 2.125 1.189 2.922.202.284.247.623-.01.835l-2.44 2.1zm3.021 2.551C17.968 22.15 14.928 23 12.32 23 8.712 23 5.462 21.696 3 19.44c-.222-.193-.024-.462.246-.31 2.692 1.568 6.012 2.51 9.45 2.51 2.317 0 4.864-.48 7.208-1.476.354-.151.65.233.261.542zm.757-2.074c-.304-.39-2.011-.185-2.779-.093-.234.028-.269-.175-.059-.322 1.361-.957 3.591-.681 3.851-.361.261.322-.068 2.554-1.344 3.619-.196.164-.383.077-.296-.137.287-.718.928-2.327.627-2.706z"/></svg>`,
    soundcloud:  `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M1.175 12.225c-.015.108-.023.215-.023.33 0 .118.008.226.023.332l-.003-.014c0 .114.005.224.015.332-.01.108-.015.218-.015.332 0 .114.005.226.015.33-.01.108-.015.224-.015.338 0 1.118.906 2.024 2.024 2.024.118 0 .234-.01.347-.03l-.012.002h11.39c.906 0 1.639-.733 1.639-1.638V9.748c0-.906-.733-1.639-1.639-1.639-.234 0-.454.05-.656.14l.01-.004c-.434-2.38-2.507-4.181-5.009-4.181-1.657 0-3.138.796-4.075 2.028l-.009.012c-.07-.01-.14-.016-.213-.016-.906 0-1.639.733-1.639 1.639 0 .046.002.091.005.136l-.001-.006c-.474.14-.88.426-1.174.806l-.004.005z"/></svg>`,
    bandcamp:    `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M0 18.75l7.437-13.5H24l-7.438 13.5z"/></svg>`,
  };

  function streamingLinks(links, style) {
    if (!links) return '';
    const order  = ['spotify','appleMusic','youtube','tidal','amazonMusic','soundcloud','bandcamp'];
    const labels = { spotify:'Spotify', appleMusic:'Apple', youtube:'YouTube', tidal:'Tidal', amazonMusic:'Amazon', soundcloud:'SoundCloud', bandcamp:'Bandcamp' };
    return order
      .filter(k => links[k])
      .map((k, i) => {
        const isPrimary = i === 0 && style !== 'album';
        return `<a class="slink${isPrimary ? ' primary' : ''}" href="${esc(links[k])}" target="_blank" rel="noopener">
          ${ICONS[k] || ''} ${labels[k]}
        </a>`;
      }).join('');
  }

  /* ── State ── */
  let allReleases  = [];
  let activeFilter = 'all';
  let searchQuery  = '';

  const TYPE_MAP = {
    single: ['single'],
    ep:     ['ep'],
    album:  ['album'],
    remix:  ['remix'],
  };

  function getFiltered() {
    let list = allReleases;
    if (activeFilter !== 'all') {
      const types = TYPE_MAP[activeFilter] || [activeFilter];
      list = list.filter(r => types.includes((r.releaseType || '').toLowerCase()));
    }
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      list = list.filter(r =>
        (r.title || '').toLowerCase().includes(q) ||
        (r.releaseType || '').toLowerCase().includes(q) ||
        String(r.releaseDate ? new Date(r.releaseDate).getFullYear() : '').includes(q)
      );
    }
    return list;
  }

  function applyFilter(type) {
    activeFilter = type;
    document.querySelectorAll('.filter-pill').forEach(p =>
      p.classList.toggle('active', p.dataset.type === type));
    updateView();
  }

  function setupSearch() {
    const input = document.getElementById('search-input');
    const wrap  = document.getElementById('search-wrap');
    const clear = document.getElementById('search-clear');
    if (!input) return;
    input.addEventListener('input', () => {
      searchQuery = input.value.trim();
      wrap.classList.toggle('active', searchQuery.length > 0);
      input.classList.toggle('has-value', searchQuery.length > 0);
      updateView();
    });
    clear.addEventListener('click', () => {
      input.value = ''; searchQuery = '';
      wrap.classList.remove('active');
      input.classList.remove('has-value');
      input.focus();
      updateView();
    });
  }

  function updateView() {
    const isFiltered = activeFilter !== 'all' || searchQuery.length > 0;

    if (isFiltered) {
      document.getElementById('feature-section').style.display  = 'none';
      document.getElementById('section-singles').style.display  = 'none';
      document.getElementById('section-albums').style.display   = 'none';
      document.getElementById('section-remixes').style.display  = 'none';
      document.getElementById('filtered-view').style.display    = '';
      renderFilteredGrid(getFiltered());
    } else {
      document.getElementById('filtered-view').style.display    = 'none';
      document.getElementById('feature-section').style.display  = '';
      document.getElementById('section-singles').style.display  = '';
      document.getElementById('section-albums').style.display   = '';
      const remixes = allReleases.filter(r => (r.releaseType || '').toLowerCase() === 'remix');
      document.getElementById('section-remixes').style.display  = remixes.length ? '' : 'none';
    }
    observe();
  }

  function renderFilteredGrid(releases) {
    const grid = document.getElementById('filtered-grid');
    if (!releases.length) {
      grid.innerHTML = '<div class="no-results" style="grid-column:1/-1;">No releases match your search.</div>';
      return;
    }
    grid.innerHTML = releases.map((rel, idx) => buildAlbumCard(rel, `filt-${idx}`)).join('');
    observe();
  }

  /* ── Shared album card builder ── */
  function buildAlbumCard(rel, idx) {
    const year      = rel.releaseDate ? new Date(rel.releaseDate).getFullYear() : '';
    const typeLabel = (rel.releaseType || 'release').toUpperCase();
    const artUrl    = rel.artworkUrl ? sanityImg(rel.artworkUrl, 600) : null;
    const src       = embedSrc(rel.streamingLinks?.spotify);
    const trackCount = rel.trackCount || 0;
    const slug      = rel.slug?.current || '';
    const relUrl    = `/release/?slug=${esc(slug)}`;
    return `
      <div class="album-card reveal">
        <a class="album-art" href="${relUrl}" aria-label="View ${esc(rel.title)}">
          ${artUrl
            ? `<img src="${esc(artUrl)}" alt="${esc(rel.title)}" loading="lazy">`
            : `<div class="album-art-ph"><span>${esc(rel.title)}</span></div>`}
          <span class="album-type-badge">${typeLabel}</span>
          ${src ? `
          <button class="album-play-btn" id="album-play-${idx}"
            onclick="event.preventDefault();toggleAlbumEmbed('${idx}')"
            aria-label="Play ${esc(rel.title)} on Spotify">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 4.5v15l13-7.5z"/></svg>
          </button>` : ''}
        </a>
        ${src ? `<div class="album-embed" id="album-embed-${idx}">
          <iframe src="" data-src="${esc(src)}"
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
            loading="lazy" title="Spotify player for ${esc(rel.title)}"></iframe>
        </div>` : ''}
        <div class="album-body">
          <a class="album-title" href="${relUrl}">${esc(rel.title)}</a>
          <div class="album-sub">${year}${trackCount ? ` · ${trackCount} track${trackCount !== 1 ? 's' : ''}` : ''}</div>
        </div>
        <div class="album-links">${streamingLinks(rel.streamingLinks, 'album')}</div>
      </div>`;
  }

  /* ── Toggle album Spotify embed ── */
  let openAlbum = null;
  function toggleAlbumEmbed(idx) {
    const wrap = document.getElementById(`album-embed-${idx}`);
    const btn  = document.getElementById(`album-play-${idx}`);
    if (!wrap) return;
    const isOpen = wrap.classList.contains('open');
    if (openAlbum !== null && openAlbum !== idx) {
      const prev    = document.getElementById(`album-embed-${openAlbum}`);
      const prevBtn = document.getElementById(`album-play-${openAlbum}`);
      if (prev) prev.classList.remove('open');
      if (prevBtn) { prevBtn.classList.remove('active'); prevBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 4.5v15l13-7.5z"/></svg>`; }
    }
    if (isOpen) {
      wrap.classList.remove('open');
      if (btn) { btn.classList.remove('active'); btn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 4.5v15l13-7.5z"/></svg>`; }
      openAlbum = null;
    } else {
      const iframe = wrap.querySelector('iframe');
      if (iframe && !iframe.src) iframe.src = iframe.dataset.src;
      wrap.classList.add('open');
      if (btn) { btn.classList.add('active'); btn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`; }
      openAlbum = idx;
    }
  }
  window.toggleAlbumEmbed = toggleAlbumEmbed;

  /* ══ FEATURE CARD RENDERER ══ */
  function renderFeatureCard(rel) {
    const wrap = document.getElementById('feature-card-wrap');
    if (!rel) { document.getElementById('feature-section').style.display = 'none'; return; }
    const year      = rel.releaseDate ? new Date(rel.releaseDate).getFullYear() : '';
    const typeLabel = (rel.releaseType || 'release').toUpperCase();
    const artUrl    = rel.artworkUrl ? sanityImg(rel.artworkUrl, 800) : null;
    const trackCount = rel.trackCount || 0;
    const slug      = rel.slug?.current || '';
    const relUrl    = `/release/?slug=${esc(slug)}`;
    wrap.innerHTML = `
      <div class="feature-card reveal">
        <a class="feature-art" href="${relUrl}" aria-label="View ${esc(rel.title)}">
          ${artUrl
            ? `<img src="${esc(artUrl)}" alt="${esc(rel.title)}" loading="lazy">`
            : `<div class="feature-art-ph"></div>`}
          <span class="feature-type-badge">${typeLabel}</span>
          <span class="feature-new-badge">New</span>
        </a>
        <div class="feature-body">
          <div class="feature-eyebrow">Latest Release</div>
          <a class="feature-title" href="${relUrl}">${esc(rel.title)}</a>
          <div class="feature-meta">${year}${trackCount ? ` · ${trackCount} track${trackCount !== 1 ? 's' : ''}` : ''}</div>
          <div class="feature-links">${streamingLinks(rel.streamingLinks, 'feature')}</div>
        </div>
      </div>`;
  }

  /* ═══ SINGLES RENDERER — 4-col card grid ═══ */
  function renderSingles(singles) {
    const grid    = document.getElementById('singles-grid');
    const countEl = document.getElementById('singles-count');
    if (!singles.length) {
      grid.innerHTML = '<div class="empty" style="grid-column:1/-1;">No singles yet.</div>';
      document.getElementById('section-singles').style.display = 'none';
      return;
    }
    countEl.textContent = `${singles.length} tracks`;
    grid.innerHTML = singles.map((rel, idx) => buildAlbumCard(rel, `s-${idx}`)).join('');
  }

  /* ═══ ALBUMS RENDERER ═══ */
  function renderAlbums(albums) {
    const grid    = document.getElementById('albums-grid');
    const countEl = document.getElementById('albums-count');
    if (!albums.length) {
      grid.innerHTML = '<div class="empty" style="grid-column:1/-1;">No albums or EPs yet.</div>';
      document.getElementById('section-albums').style.display = 'none';
      return;
    }
    countEl.textContent = `${albums.length} releases`;
    grid.innerHTML = albums.map((rel, idx) => buildAlbumCard(rel, `a-${idx}`)).join('');
  }

  /* ═══ REMIXES RENDERER ═══ */
  function renderRemixes(remixes) {
    if (!remixes.length) return;
    const container = document.getElementById('remixes-list');
    const countEl   = document.getElementById('remixes-count');
    document.getElementById('section-remixes').style.display = '';
    countEl.textContent = `${remixes.length} remixes`;
    container.innerHTML = `<div class="albums-grid">${remixes.map((rel, idx) => buildAlbumCard(rel, `remix-${idx}`)).join('')}</div>`;
  }

  /* ── Main Sanity fetch ── */
  (async function() {
    const query = `*[_type == "release"] | order(featured desc, releaseDate desc) {
      title, slug, releaseType, releaseDate, featured,
      "artworkUrl": artwork.asset->url,
      streamingLinks,
      "trackCount": count(tracks),
      "tracks": tracks[]->{title, duration, trackNumber, streamingLinks}
    }`;

    let releases;
    try {
      const res = await fetch(sanityUrl(query));
      const { result } = await res.json();
      releases = result;
    } catch(err) {
      console.warn('Sanity fetch failed', err);
      document.getElementById('feature-card-wrap').innerHTML = '';
      document.getElementById('feature-section').style.display = 'none';
      document.getElementById('singles-grid').innerHTML = '<div class="empty" style="grid-column:1/-1;">Unable to load music. Please try again.</div>';
      document.getElementById('albums-grid').innerHTML  = '<div class="empty" style="grid-column:1/-1;">Unable to load music. Please try again.</div>';
      return;
    }

    if (!releases?.length) {
      document.getElementById('feature-section').style.display = 'none';
      document.getElementById('singles-grid').innerHTML = '<div class="empty" style="grid-column:1/-1;">No releases found.</div>';
      document.getElementById('albums-grid').innerHTML  = '<div class="empty" style="grid-column:1/-1;">No releases found.</div>';
      return;
    }

    allReleases = releases;

    // Hero background — use latest release artwork
    const latestWithArt = releases.find(r => r.artworkUrl);
    if (latestWithArt) {
      const bg = document.getElementById('hero-bg');
      bg.style.backgroundImage = `url('${sanityImg(latestWithArt.artworkUrl, 1600)}')`;
    }

    // Stats
    const totalTracks = releases.reduce((acc, r) => acc + (r.trackCount || 0), 0);
    document.getElementById('stat-releases').innerHTML = `<strong>${releases.length}</strong>Releases`;
    document.getElementById('stat-tracks').innerHTML   = `<strong>${totalTracks}</strong>Tracks`;

    // Feature card: prefer featured:true, fallback to most recent (first in sorted list)
    const featuredRelease = releases.find(r => r.featured) || releases[0];
    renderFeatureCard(featuredRelease);

    // Segment
    const singles = releases.filter(r => (r.releaseType || '').toLowerCase() === 'single');
    const albums  = releases.filter(r => ['album','ep'].includes((r.releaseType || '').toLowerCase()));
    const remixes = releases.filter(r => (r.releaseType || '').toLowerCase() === 'remix');

    if (!remixes.length) {
      const remixPill = document.querySelector('.filter-pill[data-type="remix"]');
      if (remixPill) remixPill.style.display = 'none';
    }

    renderSingles(singles);
    renderAlbums(albums);
    renderRemixes(remixes);

    document.querySelectorAll('.filter-pill').forEach(pill => {
      pill.addEventListener('click', () => applyFilter(pill.dataset.type));
    });

    setupSearch();
    observe();
  })();
</script>

<script src="/assets/js/nav.js"></script>
</body>
</html>
